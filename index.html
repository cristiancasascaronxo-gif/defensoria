function VideollamadasView({ data, reload }) {
  const { toast } = useApp();
  const [filter, setFilter] = useState("pendiente");
  const [importModal, setImportModal] = useState(false);
  const [mailText, setMailText] = useState("");
  const [parsedTurnos, setParsedTurnos] = useState([]);
  const [selectedTurnos, setSelectedTurnos] = useState([]);
  const [saving, setSaving] = useState(false);

  let list = data.vlGlobal || [];
  if (filter !== "todos") list = list.filter(v => v.estado === filter);
  list = [...list].sort((a, b) => ((a.fecha || "") + (a.hora || "")).localeCompare((b.fecha || "") + (b.hora || "")));

  const changeStatus = async (v, estado) => {
    try { await api.update("vlGlobal", v.id, { ...v, estado }); await reload("vlGlobal"); }
    catch (e) { toast(e.message, "error"); }
  };

  const parseMail = () => {
    if (!mailText.trim()) { toast("Pegá el contenido del mail", "warn"); return; }
    const mesesMap = { enero: "01", febrero: "02", marzo: "03", abril: "04", mayo: "05", junio: "06", julio: "07", agosto: "08", septiembre: "09", octubre: "10", noviembre: "11", diciembre: "12" };
    const lines = mailText.split("\n");
    let fechaGlobal = "";
    const turnos = [];

    lines.forEach(line => {
      const m1 = line.match(/(\d{1,2})\s+de\s+(\w+)(?:\s+de\s+(\d{4}))?/i);
      if (m1 && mesesMap[m1[2].toLowerCase()]) {
        const yr = m1[3] || new Date().getFullYear();
        fechaGlobal = `${yr}-${mesesMap[m1[2].toLowerCase()]}-${m1[1].padStart(2, "0")}`;
      }
      const m2 = line.match(/fecha[:\s]+(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/i);
      if (m2) {
        const yr = m2[3].length === 2 ? "20" + m2[3] : m2[3];
        fechaGlobal = `${yr}-${m2[2].padStart(2, "0")}-${m2[1].padStart(2, "0")}`;
      }
    });

    lines.forEach(raw => {
      const line = raw.trim();
      if (!line || line.length < 4) return;
      if (/^(de:|para:|cc:|asunto|estimad|saludos|atte|firma|----)/i.test(line)) return;
      let nombre = "", sac = "", hora = "", unidad = "", fecha = fechaGlobal;
      const mH = line.match(/\b(\d{1,2})[:\.](\d{2})\s*(hs?|hrs?)?\b/i);
      if (mH) hora = mH[1].padStart(2, "0") + ":" + mH[2];
      const mH2 = !mH && line.match(/\b(\d{1,2})\s*hs?\b/i);
      if (mH2) hora = mH2[1].padStart(2, "0") + ":00";
      const mS = line.match(/(?:SAC|N[°º]|#)\s*:?\s*(\d{5,10})/i);
      if (mS) sac = mS[1];
      const mU = line.match(/\b(UP\s*\d+|Bouwer|Cruz del Eje|Río? Cuarto|San Martín|Bell Ville|Villa María|Montecristo)/i);
      if (mU) unidad = mU[1];
      const mFL = line.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
      if (mFL) { const yr = mFL[3].length === 2 ? "20" + mFL[3] : mFL[3]; fecha = `${yr}-${mFL[2].padStart(2, "0")}-${mFL[1].padStart(2, "0")}`; }
      const cleaned = line.replace(/(?:SAC|N[°º]|#)\s*:?\s*\d+/gi, "").replace(/\b\d{1,2}[:\.]?\d{0,2}\s*(hs?|hrs?)/gi, "").replace(/\b(UP\s*\d+|Bouwer|Cruz del Eje|Río? Cuarto|San Martín|Bell Ville|Villa María|Montecristo)\b/gi, "").replace(/\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/g, "").replace(/^[-•·|\*\t\s]+/, "").replace(/[-•·|\s]+$/, "").replace(/\s+/g, " ").trim();
      if (cleaned.length >= 3 && /[a-záéíóúñA-ZÁÉÍÓÚÑ]/.test(cleaned)) nombre = cleaned;
      if ((nombre || sac) && (hora || fecha)) {
        const preso = (data.presos || []).find(p => (sac && p.sac === sac) || (nombre && p.nombre.toLowerCase().includes(nombre.toLowerCase().split(" ")[0])));
        if (preso) { if (!nombre) nombre = preso.nombre; if (!sac) sac = preso.sac; if (!unidad && preso.unidad) unidad = preso.unidad; }
        turnos.push({ nombre, sac, fecha, hora, unidad, estado: "pendiente" });
      }
    });

    setParsedTurnos(turnos);
    setSelectedTurnos(turnos.map((_, i) => i));
    if (!turnos.length) toast("No se encontraron turnos en el texto", "warn");
  };

  const guardarTurnos = async () => {
    const items = selectedTurnos.map(i => ({ ...parsedTurnos[i], id: uid() }));
    if (!items.length) { toast("Seleccioná al menos un turno", "warn"); return; }
    setSaving(true);
    try {
      await api.batchCreate("vlGlobal", items);
      await reload("vlGlobal");
      setImportModal(false);
      setMailText(""); setParsedTurnos([]); setSelectedTurnos([]);
      toast(`${items.length} turno${items.length !== 1 ? "s" : ""} guardado${items.length !== 1 ? "s" : ""}`);
    } catch (e) { toast(e.message, "error"); }
    setSaving(false);
  };

  const stColor = { pendiente: "#e67e22", confirmado: "#2ecc71", realizado: "var(--muted)", cancelado: "#e74c3c" };

  return (
    <div style={{ padding: 32 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
        <h1 style={{ fontFamily: "Lora, serif", fontSize: 26, fontWeight: 700, color: "var(--text)" }}>Videollamadas</h1>
        <Btn onClick={() => setImportModal(true)}>📧 Importar mail de Karina</Btn>
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {[["pendiente", "Pendientes"], ["confirmado", "Confirmadas"], ["realizado", "Realizadas"], ["todos", "Todas"]].map(([v, l]) => (
          <button key={v} onClick={() => setFilter(v)} style={{ padding: "6px 14px", borderRadius: 8, border: "1.5px solid", cursor: "pointer", fontSize: 12, fontFamily: "DM Sans, sans-serif", fontWeight: 600, borderColor: filter === v ? "var(--gold)" : "var(--border)", background: filter === v ? "var(--gold)15" : "transparent", color: filter === v ? "var(--gold)" : "var(--muted)" }}>{l}</button>
        ))}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {list.map(v => (
          <div key={v.id} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, padding: "14px 18px", display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: stColor[v.estado] || "var(--muted)", flexShrink: 0 }} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text)" }}>{v.nombre || "—"}</div>
              <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 3 }}>
                <span>{fd(v.fecha)} {v.hora && v.hora + " hs"}</span>
                {v.sac && <span> · SAC {v.sac}</span>}
                {v.unidad && <span> · {v.unidad}</span>}
              </div>
            </div>
            <Badge label={v.estado} color={stColor[v.estado] || "var(--muted)"} />
            <div style={{ display: "flex", gap: 6 }}>
              {v.estado === "pendiente" && <Btn small variant="ghost" onClick={() => changeStatus(v, "confirmado")}>✓ Confirmar</Btn>}
              {(v.estado === "pendiente" || v.estado === "confirmado") && <Btn small variant="ghost" onClick={() => changeStatus(v, "realizado")}>Realizada</Btn>}
              <Btn small variant="danger" onClick={() => changeStatus(v, "cancelado")}>✕</Btn>
            </div>
          </div>
        ))}
        {!list.length && <div style={{ textAlign: "center", padding: 48, color: "var(--muted)" }}>No hay videollamadas agendadas</div>}
      </div>

      {/* Import modal */}
      <Modal open={importModal} onClose={() => { setImportModal(false); setParsedTurnos([]); setMailText(""); }} title="📧 Importar turnos — Mail de Karina Martín" wide>
        <div style={{ fontSize: 12, color: "var(--muted)", lineHeight: 1.6, marginBottom: 14 }}>
          Copiá el cuerpo completo del mail (Ctrl+A en el cuerpo, luego Ctrl+C) y pegalo abajo. El sistema extrae automáticamente nombres, SAC, fecha, hora y unidad penal.
        </div>
        <textarea value={mailText} onChange={e => setMailText(e.target.value)} placeholder={"Pegá aquí el mail de Karina Martín...\n\nEj:\nTurnos semana del 17/03/2026\nLunes 17 de marzo\n- Carballo José | SAC 1239872 | UP1 Bouwer | 10:00 hs\n- López Ana | SAC 987654 | UP2 | 11:30 hs"}
          style={{ width: "100%", height: 180, background: "var(--input-bg)", border: "1.5px solid var(--border)", borderRadius: 8, padding: 12, fontSize: 12, color: "var(--text)", fontFamily: "DM Mono, monospace", resize: "vertical", outline: "none", boxSizing: "border-box" }} />
        <div style={{ display: "flex", gap: 8, marginTop: 10, marginBottom: parsedTurnos.length ? 16 : 0 }}>
          <Btn onClick={parseMail}>🔍 Extraer turnos</Btn>
          <Btn variant="ghost" onClick={() => { setMailText(""); setParsedTurnos([]); setSelectedTurnos([]); }}>Limpiar</Btn>
        </div>
        {parsedTurnos.length > 0 && (
          <>
            <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 8 }}>{parsedTurnos.length} turno{parsedTurnos.length !== 1 ? "s" : ""} detectado{parsedTurnos.length !== 1 ? "s" : ""} — seleccioná los que querés guardar:</div>
            <div style={{ border: "1px solid var(--border)", borderRadius: 10, overflow: "hidden", marginBottom: 14 }}>
              {parsedTurnos.map((t, i) => {
                const vinculado = t.sac && (data.presos || []).find(p => p.sac === t.sac);
                const checked = selectedTurnos.includes(i);
                return (
                  <div key={i} onClick={() => setSelectedTurnos(prev => checked ? prev.filter(x => x !== i) : [...prev, i])} style={{
                    display: "flex", alignItems: "center", gap: 10, padding: "10px 14px",
                    borderBottom: i < parsedTurnos.length - 1 ? "1px solid var(--border)" : "none",
                    background: checked ? "var(--gold)08" : "transparent", cursor: "pointer",
                  }}>
                    <div style={{ width: 16, height: 16, borderRadius: 4, border: `2px solid ${checked ? "var(--gold)" : "var(--border)"}`, background: checked ? "var(--gold)" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#0a0a0f", flexShrink: 0 }}>{checked ? "✓" : ""}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text)" }}>{t.nombre || "Sin nombre"}</div>
                      <div style={{ fontSize: 11, color: "var(--muted)" }}>{t.sac && "SAC " + t.sac + " · "}{t.fecha && fd(t.fecha) + " "}{t.hora && t.hora + " hs "}{t.unidad && "· " + t.unidad}</div>
                    </div>
                    <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 10, background: vinculado ? "#2ecc7122" : "#e6702222", color: vinculado ? "#2ecc71" : "#e67e22", fontWeight: 700 }}>{vinculado ? "✓ Vinculado" : "Sin vincular"}</span>
                  </div>
                );
              })}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <Btn onClick={guardarTurnos} disabled={saving || !selectedTurnos.length}>{saving ? "Guardando..." : `✓ Guardar ${selectedTurnos.length} seleccionado${selectedTurnos.length !== 1 ? "s" : ""}`}</Btn>
              <Btn variant="ghost" onClick={() => setParsedTurnos([])}>Cancelar</Btn>
            </div>
          </>
        )}
      </Modal>
    </div>
  );
}

function PatrociniosView({ data, reload }) {
  const { toast } = useApp();
  const [modalOpen, setModalOpen] = useState(false);
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);
  const f = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const list = [...(data.patrocinios || [])].sort((a, b) => a.nombre?.localeCompare(b.nombre));

  const save = async () => {
    if (!String(form.nombre || '').trim()) { toast("Nombre requerido", "warn"); return; }
    setSaving(true);
    try {
      if (form.id) { await api.update("patrocinios", form.id, form); } else { await api.create("patrocinios", { ...form, estado: "activa", actuaciones: [], audiencias: [] }); }
      setModalOpen(false); await reload("patrocinios"); toast("Guardado");
    } catch (e) { toast(e.message, "error"); }
    setSaving(false);
  };
  const del = async (id) => { if (!confirm("¿Eliminar patrocinio?")) return; await api.delete("patrocinios", id); await reload("patrocinios"); };

  return (
    <div style={{ padding: 32 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
        <h1 style={{ fontFamily: "Lora, serif", fontSize: 26, fontWeight: 700, color: "var(--text)" }}>Patrocinios Letrados</h1>
        <Btn onClick={() => { setForm({ estado: "activa" }); setModalOpen(true); }}>+ Nuevo patrocinio</Btn>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {list.map(p => (
          <div key={p.id} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: "16px 20px", display: "flex", alignItems: "flex-start", gap: 14 }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6, flexWrap: "wrap" }}>
                <span style={{ fontFamily: "Lora, serif", fontSize: 15, fontWeight: 700, color: "var(--text)" }}>{p.nombre}</span>
                {p.tipoCausa && <Badge label={p.tipoCausa} />}
                {p.estado && <Badge label={p.estado} color={p.estado === "activa" ? "#2ecc71" : "var(--muted)"} />}
              </div>
              <div style={{ fontSize: 12, color: "var(--muted)", display: "flex", gap: 14, flexWrap: "wrap" }}>
                {p.expediente && <span>📄 Exp. {p.expediente}</span>}
                {p.juzgado && <span>🏛 {p.juzgado}</span>}
                {p.telefono && <span>📱 {p.telefono}</span>}
              </div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <Btn small variant="ghost" onClick={() => { setForm({ ...p }); setModalOpen(true); }}>✏</Btn>
              <Btn small variant="danger" onClick={() => del(p.id)}>✕</Btn>
            </div>
          </div>
        ))}
        {!list.length && <div style={{ textAlign: "center", padding: 48, color: "var(--muted)" }}>No hay patrocinios registrados</div>}
      </div>
      <Modal open={modalOpen} onClose={() => setModalOpen(false)} title={form.id ? "Editar patrocinio" : "Nuevo patrocinio"}>
        <Input label="Nombre del patrocinado *" value={form.nombre} onChange={v => f("nombre", v)} required />
        <Row2>
          <Input label="Tipo de causa" value={form.tipoCausa} onChange={v => f("tipoCausa", v)} placeholder="Ej: Limitación de Capacidad" />
          <Input label="Expediente" value={form.expediente} onChange={v => f("expediente", v)} />
        </Row2>
        <Row2>
          <Input label="Juzgado" value={form.juzgado} onChange={v => f("juzgado", v)} />
          <Input label="Secretaría" value={form.secretaria} onChange={v => f("secretaria", v)} />
        </Row2>
        <Row2>
          <Input label="Contraparte" value={form.contraparte} onChange={v => f("contraparte", v)} />
          <Input label="Abogado contraparte" value={form.abogadoContraparte} onChange={v => f("abogadoContraparte", v)} />
        </Row2>
        <Row2>
          <Input label="Teléfono" value={form.telefono} onChange={v => f("telefono", v)} />
          <Input label="Email" value={form.email} onChange={v => f("email", v)} type="email" />
        </Row2>
        <Select label="Estado" value={form.estado} onChange={v => f("estado", v)} options={[{ value: "activa", label: "Activa" }, { value: "archivada", label: "Archivada" }]} />
        <Textarea label="Notas" value={form.notas} onChange={v => f("notas", v)} rows={3} />
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <Btn variant="ghost" onClick={() => setModalOpen(false)}>Cancelar</Btn>
          <Btn onClick={save} disabled={saving}>{saving ? "Guardando..." : "Guardar"}</Btn>
        </div>
      </Modal>
    </div>
  );
}

function InformeDiario({ data, onClose }) {
  const hoy = new Date();
  const hoyISO = hoy.toISOString().split("T")[0];
  const fechaStr = hoy.toLocaleDateString("es-AR", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
  const [copied, setCopied] = useState(false);

  // Todo lo del día
  const presosHoy = (data.presos || []).filter(p => p.ingreso === hoyISO);
  const detenidos = (data.presos || []).filter(p => (p.badges || []).some(b => b.includes("detenido") || b.includes("s_det")) || p.estado === "detenido");
  const escPresentadosHoy = (data.escritos || []).filter(e => e.fechaPresentacion === hoyISO);
  const escCreadosHoy = (data.escritos || []).filter(e => e.fechaCreacion === hoyISO && e.fechaPresentacion !== hoyISO);
  const escEnProceso = (data.escritos || []).filter(e => e.status === "en_proceso");
  const vistasHoy = (data.vistas || []).filter(v => v.fechaVencimiento === hoyISO);
  const novHoy = (data.novedades || []).filter(n => n.fecha === hoyISO);
  const vlHoy = (data.vlGlobal || []).filter(v => v.fecha === hoyISO);
  const tareasCompletadasHoy = (data.tareas || []).filter(t => t.fechaCompletada === hoyISO);
  const tareasVencenHoy = (data.tareas || []).filter(t => t.vencimiento === hoyISO && t.estado !== "completada");
  const urgPend = (data.tareas || []).filter(t => t.estado !== "completada" && t.prioridad === "alta");

  const tmañana = new Date(hoy); tmañana.setDate(tmañana.getDate() + 1);
  const tmañanaISO = tmañana.toISOString().split("T")[0];
  const vistasMañana = (data.vistas || []).filter(v => v.estado === "pendiente" && v.fechaVencimiento === tmañanaISO);
  const tareasMañana = (data.tareas || []).filter(t => t.vencimiento === tmañanaISO && t.estado !== "completada");

  const tipoLabel = (tipo) => ESCRITO_TIPOS.find(t => t.val === tipo)?.label || tipo;

  const SEP = "══════════════════════════════════";
  let txt = SEP + "\n📋 INFORME DIARIO — DEFENSORÍA\n" + fechaStr.toUpperCase() + "\n" + SEP + "\n\n";

  txt += "📊 SITUACIÓN GENERAL\n";
  txt += "• Total imputados activos: " + (data.presos?.length || 0) + "\n";
  txt += "• Detenidos: " + detenidos.length + "\n";
  txt += "• En libertad: " + ((data.presos?.length || 0) - detenidos.length) + "\n";
  txt += "• Patrocinios: " + (data.patrocinios?.length || 0) + "\n\n";

  txt += "🆕 INGRESOS DEL DÍA\n";
  if (presosHoy.length) presosHoy.forEach(p => { txt += "  • " + p.nombre + " — " + p.delito + " — SAC " + p.sac + "\n"; });
  else txt += "  • Sin nuevos ingresos.\n";
  txt += "\n";

  if (vlHoy.length) {
    txt += "📹 VIDEOLLAMADAS (" + vlHoy.length + ")\n";
    vlHoy.forEach(v => { txt += "  • " + v.nombre + " — " + v.hora + " hs" + (v.unidad ? " · " + v.unidad : "") + " [" + v.estado + "]\n"; });
    txt += "\n";
  }

  if (vistasHoy.length) {
    txt += "⚖ VISTAS DE HOY (" + vistasHoy.length + ")\n";
    vistasHoy.forEach(v => { txt += "  • " + v.titulo + (v.imputado ? " — " + v.imputado : "") + " [" + v.estado + "]\n"; });
    txt += "\n";
  }

  if (escPresentadosHoy.length) {
    txt += "✍ ESCRITOS PRESENTADOS HOY (" + escPresentadosHoy.length + ")\n";
    escPresentadosHoy.forEach(e => { txt += "  • [" + tipoLabel(e.tipo) + "] " + e.titulo + (e.imputado ? " — " + e.imputado : "") + "\n"; });
    txt += "\n";
  }

  if (escCreadosHoy.length) {
    txt += "📝 ESCRITOS INICIADOS HOY (" + escCreadosHoy.length + ")\n";
    escCreadosHoy.forEach(e => { txt += "  • [" + tipoLabel(e.tipo) + "] " + e.titulo + (e.imputado ? " — " + e.imputado : "") + (e.fechaVencimiento ? " (vence " + fd(e.fechaVencimiento) + ")" : "") + "\n"; });
    txt += "\n";
  }

  if (escEnProceso.length) {
    txt += "🔄 EN ELABORACIÓN (" + escEnProceso.length + ")\n";
    escEnProceso.forEach(e => { txt += "  • [" + tipoLabel(e.tipo) + "] " + e.titulo + (e.fechaVencimiento ? " (vence " + fd(e.fechaVencimiento) + ")" : "") + "\n"; });
    txt += "\n";
  }

  if (tareasCompletadasHoy.length) {
    txt += "✅ TAREAS COMPLETADAS HOY (" + tareasCompletadasHoy.length + ")\n";
    tareasCompletadasHoy.forEach(t => { txt += "  • " + t.titulo + (t.imputado ? " — " + t.imputado : "") + "\n"; });
    txt += "\n";
  }

  if (tareasVencenHoy.length) {
    txt += "⚠ TAREAS VENCIDAS HOY SIN COMPLETAR (" + tareasVencenHoy.length + ")\n";
    tareasVencenHoy.forEach(t => { txt += "  • " + t.titulo + (t.imputado ? " — " + t.imputado : "") + "\n"; });
    txt += "\n";
  }

  if (novHoy.length) {
    txt += "📌 NOVEDADES (" + novHoy.length + ")\n";
    novHoy.forEach(n => { txt += "  • " + n.titulo + (n.descripcion ? ": " + n.descripcion : "") + "\n"; });
    txt += "\n";
  }

  if (vistasMañana.length || tareasMañana.length) {
    txt += "📅 MAÑANA\n";
    vistasMañana.forEach(v => { txt += "  • [Vista] " + v.titulo + (v.imputado ? " — " + v.imputado : "") + "\n"; });
    tareasMañana.forEach(t => { txt += "  • [Tarea] " + t.titulo + (t.imputado ? " — " + t.imputado : "") + "\n"; });
    txt += "\n";
  }

  if (urgPend.length) {
    txt += "🔴 URGENTE PENDIENTE (" + urgPend.length + ")\n";
    urgPend.forEach(x => { txt += "  • " + x.titulo + (x.vencimiento ? " — vence " + fd(x.vencimiento) : "") + (x.imputado ? " — " + x.imputado : "") + "\n"; });
    txt += "\n";
  }

  txt += SEP + "\nDefensorIA · " + hoy.toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" }) + " hs";

    const copy = () => { navigator.clipboard.writeText(txt).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }); };

  return (
    <Modal open onClose={onClose} title="📋 Informe Diario" wide>
      <div style={{ marginBottom: 12, display: "flex", gap: 8, alignItems: "center" }}>
        <Btn variant="green" onClick={copy}>{copied ? "✓ ¡Copiado!" : "📋 Copiar para WhatsApp / Mail"}</Btn>
        <span style={{ fontSize: 11, color: "var(--muted)" }}>Incluye toda la actividad del día</span>
      </div>
      <div style={{ background: "var(--surface2)", border: "1px solid var(--border)", borderRadius: 10, padding: 16, fontFamily: "DM Mono, monospace", fontSize: 12, lineHeight: 1.8, whiteSpace: "pre-wrap", color: "var(--text)", maxHeight: 480, overflowY: "auto" }}>{txt}</div>
    </Modal>
  );
}


function InformeDefensoria({ data, onClose }) {
  const [desde, setDesde] = useState(new Date(Date.now() - 30 * 86400000).toISOString().split("T")[0]);
  const [hasta, setHasta] = useState(today());
  const [chks, setChks] = useState({ presos: true, escritos: true, vistas: true, resoluciones: true, patrocinios: true, vl: true, novedades: true, stats: true });
  const [output, setOutput] = useState("");
  const [copied, setCopied] = useState(false);

  const setRango = (dias) => { setHasta(today()); setDesde(new Date(Date.now() - dias * 86400000).toISOString().split("T")[0]); };
  const inR = (f) => f && f >= desde && f <= hasta;
  const tipoLabel = (tipo) => ESCRITO_TIPOS.find(t => t.val === tipo)?.label || tipo;

  const generar = () => {
    const sep = "─".repeat(48);
    let t = `DEFENSORÍA PENAL — INFORME DE GESTIÓN\nPeríodo: ${fd(desde)} al ${fd(hasta)}\nGenerado: ${new Date().toLocaleString("es-AR")}\n${"═".repeat(48)}\n\n`;
    if (chks.stats) {
      const det = (data.presos || []).filter(p => p.estado === "detenido").length;
      t += `ESTADÍSTICAS\n• Total asistidos: ${data.presos?.length || 0}\n  - Detenidos: ${det}\n  - En libertad: ${(data.presos?.length || 0) - det}\n  - Con antecedentes: ${(data.presos || []).filter(p => p.reincidente).length}\n• Patrocinios: ${data.patrocinios?.length || 0}\n${sep}\n\n`;
    }
    if (chks.presos) {
      const ing = (data.presos || []).filter(p => inR(p.ingreso));
      const det = (data.presos || []).filter(p => p.estado === "detenido");
      t += `IMPUTADOS\nCartera: ${data.presos?.length || 0} · Detenidos: ${det.length}\n`;
      if (ing.length) { t += `Ingresos en período (${ing.length}):\n`; ing.forEach(p => { t += `  • ${p.nombre} — SAC ${p.sac} — ${p.delito}\n`; }); }
      t += `\n${sep}\n\n`;
    }
    if (chks.escritos) {
      const esc = (data.escritos || []).filter(e => inR(e.fechaCreacion));
      const pres = (data.escritos || []).filter(e => e.status === "presentado" && inR(e.fechaPresentacion || e.fechaCreacion));
      const enP = (data.escritos || []).filter(e => e.status === "en_proceso");
      t += `ESCRITOS\nCreados: ${esc.length} · Presentados: ${pres.length}\n`;
      pres.forEach(e => { t += `  • [${tipoLabel(e.tipo)}] ${e.titulo}${e.imputado ? " — " + e.imputado : ""}\n`; });
      if (enP.length) { t += `En elaboración: ${enP.length}\n`; enP.forEach(e => { t += `  • [${tipoLabel(e.tipo)}] ${e.titulo}${e.fechaVencimiento ? " — Vence: " + fd(e.fechaVencimiento) : ""}\n`; }); }
      t += `\n${sep}\n\n`;
    }
    if (chks.vistas) {
      const vp = (data.vistas || []).filter(v => inR(v.fechaVencimiento));
      t += `VISTAS Y AUDIENCIAS (${vp.length})\n`;
      vp.forEach(v => { t += `  • ${v.titulo} — ${v.imputado} — ${fd(v.fechaVencimiento)} [${v.estado}]\n`; });
      t += `\n${sep}\n\n`;
    }
    if (chks.vl) {
      const vlp = (data.vlGlobal || []).filter(v => inR(v.fecha));
      t += `VIDEOLLAMADAS EN PERÍODO (${vlp.length})\n`;
      vlp.forEach(v => { t += `  • ${fd(v.fecha)} ${v.hora} hs — ${v.nombre} (SAC ${v.sac})${v.unidad ? " — " + v.unidad : ""} [${v.estado}]\n`; });
      t += `\n${sep}\n\n`;
    }
    if (chks.resoluciones) {
      const nr = (data.novedades || []).filter(n => inR(n.fecha) && (n.tipo === "resolucion" || (n.titulo || "").toLowerCase().includes("resolu") || (n.titulo || "").toLowerCase().includes("sentencia")));
      t += `RESOLUCIONES (${nr.length})\n`;
      nr.forEach(n => { t += `  • ${n.fecha} — ${n.titulo}${n.imputado ? " (" + n.imputado + ")" : ""}\n`; });
      t += `\n${sep}\n\n`;
    }
    if (chks.novedades) {
      const nov = (data.novedades || []).filter(n => inR(n.fecha));
      t += `NOVEDADES (${nov.length})\n`;
      nov.forEach(n => { t += `  • [${n.fecha}] ${n.titulo}${n.imputado ? " — " + n.imputado : ""}: ${n.descripcion || ""}\n`; });
      t += `\n${sep}\n\n`;
    }
    if (chks.patrocinios) {
      t += `PATROCINIOS (${data.patrocinios?.length || 0})\n`;
      (data.patrocinios || []).forEach(p => { t += `  • ${p.nombre} — ${p.tipoCausa || ""}${p.expediente ? " — " + p.expediente : ""}${p.juzgado ? " — " + p.juzgado : ""}\n`; });
    }
    t += `${"═".repeat(48)}\nGenerado por DefensorIA`;
    setOutput(t);
  };

  const copy = () => { if (!output) return; navigator.clipboard.writeText(output).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }); };

  const checkRow = (id, label) => (
    <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 13, color: "var(--text)" }}>
      <input type="checkbox" checked={chks[id]} onChange={e => setChks(p => ({ ...p, [id]: e.target.checked }))} />
      {label}
    </label>
  );

  return (
    <Modal open onClose={onClose} title="🏛 Informe Defensoría General" wide>
      <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", marginBottom: 18 }}>
        <label style={{ fontSize: 12, color: "var(--muted)" }}>Desde</label>
        <input type="date" value={desde} onChange={e => setDesde(e.target.value)} style={{ background: "var(--input-bg)", border: "1.5px solid var(--border)", borderRadius: 8, padding: "7px 10px", fontSize: 13, color: "var(--text)", outline: "none" }} />
        <label style={{ fontSize: 12, color: "var(--muted)" }}>Hasta</label>
        <input type="date" value={hasta} onChange={e => setHasta(e.target.value)} style={{ background: "var(--input-bg)", border: "1.5px solid var(--border)", borderRadius: 8, padding: "7px 10px", fontSize: 13, color: "var(--text)", outline: "none" }} />
        <Btn small variant="ghost" onClick={() => setRango(7)}>7 días</Btn>
        <Btn small variant="ghost" onClick={() => setRango(30)}>30 días</Btn>
        <Btn small variant="ghost" onClick={() => setRango(90)}>3 meses</Btn>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 20px", marginBottom: 16 }}>
        {checkRow("presos", "👥 Imputados / Detenidos")}
        {checkRow("escritos", "✍ Escritos")}
        {checkRow("vistas", "⚖ Vistas y audiencias")}
        {checkRow("resoluciones", "📄 Resoluciones")}
        {checkRow("patrocinios", "◍ Patrocinios")}
        {checkRow("vl", "📹 Videollamadas")}
        {checkRow("novedades", "📌 Novedades")}
        {checkRow("stats", "📊 Estadísticas")}
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <Btn onClick={generar}>🏛 Generar</Btn>
        <Btn variant="ghost" onClick={copy} disabled={!output}>{copied ? "✓ ¡Copiado!" : "📋 Copiar"}</Btn>
      </div>
      {output && <div style={{ background: "var(--surface2)", border: "1px solid var(--border)", borderRadius: 10, padding: 14, fontFamily: "DM Mono, monospace", fontSize: 11, lineHeight: 1.7, whiteSpace: "pre-wrap", color: "var(--text)", maxHeight: 380, overflowY: "auto" }}>{output}</div>}
    </Modal>
  );
}

// ─────────────────────────────────────────────────────────
// ROOT APP
// ─────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("dashboard");
  const [data, setData] = useState({ presos: [], tareas: [], novedades: [], vistas: [], patrocinios: [], escritos: [], vlGlobal: [] });
  const [loading, setLoading] = useState(true);
  const [loadStatus, setLoadStatus] = useState("Conectando con Google Sheets...");
  const [toasts, setToasts] = useState([]);
  const [modal, setModal] = useState(null);

  const toast = useCallback((msg, type = "ok") => {
    const id = uid();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
  }, []);

  const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

  const reload = useCallback(async (entity) => {
    try {
      const result = await api.getAll(entity);
      setData(prev => ({ ...prev, [entity]: result }));
    } catch (e) { toast(e.message, "error"); }
  }, [toast]);

  const loadAll = useCallback(async () => {
    setLoading(true);
    const entities = ["presos", "tareas", "novedades", "vistas", "patrocinios", "escritos", "vlGlobal"];
    const newData = {};
    for (const entity of entities) {
      setLoadStatus(`Cargando ${entity}...`);
      try { newData[entity] = await api.getAll(entity); } catch (e) { newData[entity] = []; console.warn(entity, e.message); }
    }
    setData(newData);
    setLoading(false);
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  // Recordatorio 13:45
  useEffect(() => {
    let shown = false;
    const check = () => {
      const n = new Date();
      if (n.getHours() === 13 && n.getMinutes() === 45 && !shown) {
        shown = true;
        setModal("informeDiario");
        setTimeout(() => { shown = false; }, 70000);
      }
    };
    const interval = setInterval(check, 30000);
    return () => clearInterval(interval);
  }, []);

  const openModal = (name) => setModal(name);
  const closeModal = () => setModal(null);

  if (loading) return <LoadingScreen status={loadStatus} />;

  const ctx = { toast, api, reload };

  return (
    <AppCtx.Provider value={ctx}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
          --bg: #f0f2f5;
          --surface: #ffffff;
          --surface2: #f7f8fa;
          --sidebar-bg: #1a2744;
          --border: #e2e6ed;
          --text: #1a2130;
          --muted: #7a8499;
          --gold: #c5993a;
          --gold-dim: #a07c2a;
          --purple: #6a3fa0;
          --input-bg: #ffffff;
          --hover: #f5f7fb;
          --accent: #1a2744;
          --accent-light: #e8ecf4;
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes modalIn { from { opacity: 0; transform: translateY(-12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes loading { 0%, 100% { transform: translateX(-100%); } 50% { transform: translateX(200%); } }
        input, select, textarea { color-scheme: light; }
        select option { background: #ffffff; color: #1a2130; }
      `}</style>

      {/* Topbar */}
      <div style={{
        position: "fixed", top: 0, left: 220, right: 0, height: 56, zIndex: 90,
        background: "var(--surface)", borderBottom: "1px solid var(--border)",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "0 28px", boxShadow: "0 1px 4px rgba(26,39,68,0.07)",
      }}>
        <div style={{ fontSize: 13, color: "var(--muted)", fontFamily: "DM Mono, monospace" }}>
          {new Date().toLocaleDateString("es-AR", { weekday: "long", day: "numeric", month: "long" }).replace(/^\w/, c => c.toUpperCase())}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <Btn variant="green" small onClick={() => openModal("informeDiario")}>📋 Informe Diario</Btn>
          <Btn variant="ghost" small onClick={() => openModal("informeDefensoria")}>🏛 Defensoría General</Btn>
          <Btn variant="ghost" small onClick={loadAll}>⟳ Actualizar</Btn>
        </div>
      </div>

      {/* Sidebar */}
      <Sidebar view={view} setView={setView} data={data} />

      {/* Main */}
      <main style={{ marginLeft: 220, paddingTop: 56, minHeight: "100vh", background: "var(--bg)" }}>
        {view === "dashboard" && <Dashboard data={data} setView={setView} openModal={openModal} />}
        {view === "presos" && <PresosView data={data} reload={reload} />}
        {view === "escritos" && <EscritosView data={data} reload={reload} />}
        {view === "tareas" && <TareasView data={data} reload={reload} />}
        {view === "vistas" && <VistasView data={data} reload={reload} />}
        {view === "videollamadas" && <VideollamadasView data={data} reload={reload} />}
        {view === "novedades" && <NovedadesView data={data} reload={reload} />}
        {view === "patrocinios" && <PatrociniosView data={data} reload={reload} />}
      </main>

      {/* Global modals */}
      {modal === "informeDiario" && <InformeDiario data={data} onClose={closeModal} />}
      {modal === "informeDefensoria" && <InformeDefensoria data={data} onClose={closeModal} />}

      <Toast toasts={toasts} removeToast={removeToast} />
    </AppCtx.Provider>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
document.getElementById('loading').style.display = 'none';
  </script>
</body>
</html>
