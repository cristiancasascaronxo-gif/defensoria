<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DefensorIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f0f2f5; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; }
    #loading h2 { font-family: Georgia, serif; color: #1a2744; font-size: 22px; }
    #loading p { color: #666; font-size: 14px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e0e0e0; border-top-color: #1a2744; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideRight { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h2>DefensorIA</h2>
    <p>Cargando aplicación...</p>
  </div>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('loading').innerHTML = '<h2 style="color:#c00">Error</h2><p style="color:#666;margin-top:8px">' + msg + '</p>';
    };
  </script>
  <script type="text/babel">
// DefensorIA — React App
// Conectada a Google Apps Script / Google Sheets
// Reemplazar GAS_URL con la URL de tu Web App deployada

const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

// ─────────────────────────────────────────────────────────
// CONFIG — REEMPLAZAR CON TU URL
// ─────────────────────────────────────────────────────────
const GAS_URL = "https://script.google.com/macros/s/AKfycbzOAhdfa0uygpJHXo19a55gTkzb19JF0NwsIlqFAh6lA81tV7WNc-RY8siESGevY9jh/exec";

// ─────────────────────────────────────────────────────────
// API CLIENT
// ─────────────────────────────────────────────────────────
const api = {
  async call(action, entity, payload = {}) {
    const body = { action, entity, ...payload };
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(body),
    });
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    return json;
  },
  getAll: (entity) => api.call("getAll", entity),
  create: (entity, data) => api.call("create", entity, { data }),
  update: (entity, id, data) => api.call("update", entity, { id, data }),
  delete: (entity, id) => api.call("delete", entity, { id }),
  batchCreate: (entity, items) => api.call("batchCreate", entity, { items }),
  health: () => api.call("health", ""),
};

// ─────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────
const fd = (d) => {
  if (!d || d === "Invalid Date") return "—";
  try {
    const str = String(d);
    // Already formatted date string YYYY-MM-DD
    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
      const [y, m, day] = str.split('-');
      return `${day}/${m}/${y}`;
    }
    const date = new Date(str);
    if (isNaN(date.getTime())) return "—";
    return date.toLocaleDateString("es-AR");
  } catch { return "—"; }
};
const today = () => new Date().toISOString().split("T")[0];
const uid = () => Date.now() + Math.floor(Math.random() * 1000);

// ─────────────────────────────────────────────────────────
// CONTEXT
// ─────────────────────────────────────────────────────────
const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

// ─────────────────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────────────────
function Toast({ toasts, removeToast }) {
  return (
    <div style={{ position: "fixed", bottom: 28, right: 28, zIndex: 9999, display: "flex", flexDirection: "column", gap: 8 }}>
      {toasts.map(t => (
        <div key={t.id} onClick={() => removeToast(t.id)} style={{
          background: t.type === "error" ? "#c0392b" : t.type === "warn" ? "#e67e22" : "#1e3a2f",
          color: "#fff", padding: "10px 18px", borderRadius: 10, fontSize: 13,
          fontFamily: "DM Mono, monospace", cursor: "pointer",
          boxShadow: "0 4px 20px rgba(0,0,0,0.3)", maxWidth: 340,
          borderLeft: `4px solid ${t.type === "error" ? "#e74c3c" : t.type === "warn" ? "#f39c12" : "#2ecc71"}`,
          animation: "slideIn 0.25s ease",
        }}>{t.msg}</div>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// MODAL WRAPPER
// ─────────────────────────────────────────────────────────
function Modal({ open, onClose, title, children, wide }) {
  if (!open) return null;
  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(10,10,15,0.65)",
      display: "flex", alignItems: "center", justifyContent: "center",
      zIndex: 800, backdropFilter: "blur(4px)",
    }}>
      <div style={{
        background: "var(--surface)", border: "1px solid var(--border)",
        borderRadius: 18, width: wide ? 820 : 620, maxWidth: "95vw",
        maxHeight: "90vh", display: "flex", flexDirection: "column",
        boxShadow: "0 24px 80px rgba(0,0,0,0.5)",
        animation: "modalIn 0.2s ease",
      }}>
        <div style={{
          padding: "18px 24px", borderBottom: "1px solid var(--border)",
          display: "flex", alignItems: "center", justifyContent: "space-between",
        }}>
          <span style={{ fontFamily: "Lora, serif", fontSize: 18, fontWeight: 700, color: "var(--gold)" }}>{title}</span>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "var(--muted)", fontSize: 22, cursor: "pointer", lineHeight: 1 }}>×</button>
        </div>
        <div style={{ padding: "20px 24px", overflowY: "auto", flex: 1 }}>
          {children}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// FORM FIELDS
// ─────────────────────────────────────────────────────────
const Input = ({ label, value, onChange, type = "text", placeholder, required }) => (
  <div style={{ marginBottom: 14 }}>
    {label && <label style={{ display: "block", fontSize: 11, color: "var(--muted)", marginBottom: 5, fontFamily: "DM Mono, monospace", textTransform: "uppercase", letterSpacing: "0.07em" }}>{label}{required && " *"}</label>}
    <input
      type={type}
      value={value || ""}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      style={{ width: "100%", background: "var(--input-bg)", border: "1.5px solid var(--border)", borderRadius: 8, padding: "9px 12px", fontSize: 13, color: "var(--text)", fontFamily: "DM Sans, sans-serif", outline: "none", boxSizing: "border-box" }}
    />
  </div>
);

const Select = ({ label, value, onChange, options, required }) => (
  <div style={{ marginBottom: 14 }}>
    {label && <label style={{ display: "block", fontSize: 11, color: "var(--muted)", marginBottom: 5, fontFamily: "DM Mono, monospace", textTransform: "uppercase", letterSpacing: "0.07em" }}>{label}{required && " *"}</label>}
    <select value={value || ""} onChange={e => onChange(e.target.value)}
      style={{ width: "100%", background: "var(--input-bg)", border: "1.5px solid var(--border)", borderRadius: 8, padding: "9px 12px", fontSize: 13, color: "var(--text)", fontFamily: "DM Sans, sans-serif", outline: "none", cursor: "pointer" }}>
      {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);

const Textarea = ({ label, value, onChange, placeholder, rows = 3 }) => (
  <div style={{ marginBottom: 14 }}>
    {label && <label style={{ display: "block", fontSize: 11, color: "var(--muted)", marginBottom: 5, fontFamily: "DM Mono, monospace", textTransform: "uppercase", letterSpacing: "0.07em" }}>{label}</label>}
    <textarea value={value || ""} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows}
      style={{ width: "100%", background: "var(--input-bg)", border: "1.5px solid var(--border)", borderRadius: 8, padding: "9px 12px", fontSize: 13, color: "var(--text)", fontFamily: "DM Sans, sans-serif", outline: "none", resize: "vertical", boxSizing: "border-box" }} />
  </div>
);

const Row2 = ({ children }) => (
  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>{children}</div>
);

const Btn = ({ children, onClick, variant = "primary", small, style: s = {}, disabled }) => {
  const base = { border: "none", borderRadius: 8, cursor: disabled ? "not-allowed" : "pointer", fontFamily: "DM Sans, sans-serif", fontWeight: 600, transition: "all 0.15s", opacity: disabled ? 0.5 : 1 };
  const variants = {
    primary: { background: "var(--accent)", color: "#ffffff", padding: small ? "5px 12px" : "9px 18px", fontSize: small ? 11 : 13 },
    ghost: { background: "transparent", color: "var(--muted)", border: "1.5px solid var(--border)", padding: small ? "4px 10px" : "8px 16px", fontSize: small ? 11 : 13 },
    danger: { background: "transparent", color: "#e74c3c", border: "1.5px solid #e74c3c", padding: small ? "4px 10px" : "8px 16px", fontSize: small ? 11 : 13 },
    green: { background: "#1e7e4a", color: "#fff", padding: small ? "5px 12px" : "9px 18px", fontSize: small ? 11 : 13 },
    blue: { background: "#1a3a6e", color: "#fff", padding: small ? "5px 12px" : "9px 18px", fontSize: small ? 11 : 13 },
  };
  return <button onClick={onClick} disabled={disabled} style={{ ...base, ...variants[variant], ...s }}>{children}</button>;
};

const Badge = ({ label, color = "var(--gold)" }) => (
  <span style={{ background: color + "22", color, border: `1px solid ${color}44`, borderRadius: 20, padding: "2px 9px", fontSize: 10, fontFamily: "DM Mono, monospace", textTransform: "uppercase", letterSpacing: "0.07em", fontWeight: 700 }}>{label}</span>
);

// ─────────────────────────────────────────────────────────
// SIDEBAR NAV
// ─────────────────────────────────────────────────────────
const NAV = [
  { id: "dashboard", icon: "⌘", label: "Dashboard" },
  { id: "presos", icon: "◉", label: "Imputados" },
  { id: "escritos", icon: "✍", label: "Escritos" },
  { id: "tareas", icon: "⚑", label: "Tareas" },
  { id: "vistas", icon: "◧", label: "Vistas" },
  { id: "videollamadas", icon: "◈", label: "Videollamadas" },
  { id: "novedades", icon: "◉", label: "Novedades" },
  { id: "patrocinios", icon: "⊙", label: "Patrocinios" },
];

function Sidebar({ view, setView, data }) {
  const badges = {
    presos: data.presos?.length || 0,
    tareas: data.tareas?.filter(t => t.estado !== "completada").length || 0,
    vistas: data.vistas?.filter(v => v.estado === "pendiente").length || 0,
    escritos: data.escritos?.filter(e => e.status === "en_proceso").length || 0,
    videollamadas: data.vlGlobal?.filter(v => v.estado === "pendiente" || v.estado === "confirmado").length || 0,
  };
  return (
    <div style={{
      width: 220, minHeight: "100vh", background: "var(--sidebar-bg)",
      borderRight: "1px solid var(--border)", display: "flex", flexDirection: "column",
      position: "fixed", left: 0, top: 0, bottom: 0, zIndex: 100,
    }}>
      {/* Logo */}
      <div style={{ padding: "28px 20px 24px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ fontFamily: "Lora, serif", fontSize: 20, fontWeight: 700, color: "var(--gold)", letterSpacing: "-0.02em" }}>DefensorIA</div>
        <div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", marginTop: 3, fontFamily: "DM Mono, monospace", textTransform: "uppercase", letterSpacing: "0.1em" }}>Defensoría Penal</div>
      </div>
      {/* Nav */}
      <nav style={{ flex: 1, padding: "12px 10px", overflowY: "auto" }}>
        {NAV.map(item => (
          <button key={item.id} onClick={() => setView(item.id)} style={{
            width: "100%", display: "flex", alignItems: "center", gap: 10,
            padding: "9px 12px", borderRadius: 9, border: "none", cursor: "pointer",
            background: view === item.id ? "rgba(255,255,255,0.12)" : "transparent",
            color: view === item.id ? "var(--gold)" : "rgba(255,255,255,0.75)",
            fontSize: 13, fontFamily: "DM Sans, sans-serif", fontWeight: view === item.id ? 600 : 400,
            marginBottom: 2, transition: "all 0.15s", textAlign: "left",
            borderLeft: view === item.id ? "3px solid var(--gold)" : "3px solid transparent", borderRadius: 6,
          }}>
            <span style={{ fontSize: 14, opacity: 0.8 }}>{item.icon}</span>
            <span style={{ flex: 1 }}>{item.label}</span>
            {badges[item.id] > 0 && (
              <span style={{ background: view === item.id ? "var(--gold)" : "rgba(255,255,255,0.15)", color: view === item.id ? "#1a2744" : "rgba(255,255,255,0.9)", borderRadius: 20, padding: "1px 7px", fontSize: 10, fontWeight: 700 }}>{badges[item.id]}</span>
            )}
          </button>
        ))}
      </nav>
      {/* Footer */}
      <div style={{ padding: "14px 20px", borderTop: "1px solid var(--border)", fontSize: 10, color: "var(--muted)", fontFamily: "DM Mono, monospace" }}>
        <div style={{ color: "var(--muted)" }}>● CONECTADO</div>
        <div style={{ marginTop: 3, opacity: 0.5 }}>{new Date().toLocaleDateString("es-AR")}</div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────────────────
function Dashboard({ data, setView, openModal }) {
  const detenidos = data.presos?.filter(p => p.estado === "detenido") || [];
  const tareasUrg = data.tareas?.filter(t => t.estado !== "completada").sort((a, b) => ({ alta: 0, media: 1, baja: 2 }[a.prioridad] - { alta: 0, media: 1, baja: 2 }[b.prioridad])).slice(0, 5) || [];
  const proxVistas = data.vistas?.filter(v => v.estado === "pendiente").sort((a, b) => a.fechaVencimiento > b.fechaVencimiento ? 1 : -1).slice(0, 5) || [];
  const escPend = data.escritos?.filter(e => e.status === "en_proceso").sort((a, b) => (a.fechaVencimiento || "9999").localeCompare(b.fechaVencimiento || "9999")).slice(0, 5) || [];
  const proxVL = data.vlGlobal?.filter(v => v.estado !== "cancelado").sort((a, b) => ((a.fecha || "") + (a.hora || "")).localeCompare((b.fecha || "") + (b.hora || ""))).slice(0, 5) || [];
  const [expandedRow, setExpandedRow] = useState(null);

  const toggleRow = (id) => setExpandedRow(prev => prev === id ? null : id);

  const StatCard = ({ label, value, sub, color = "var(--accent)", onClick }) => (
    <div onClick={onClick} style={{
      background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14,
      padding: "18px 20px", cursor: onClick ? "pointer" : "default",
      transition: "all 0.15s",
    }} onMouseEnter={e => { if (onClick) { e.currentTarget.style.borderColor = color; e.currentTarget.style.transform = "translateY(-2px)"; } }}
      onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.transform = ""; }}>
      <div style={{ fontSize: 11, color: "var(--muted)", fontFamily: "DM Mono, monospace", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>{label}</div>
      <div style={{ fontSize: 32, fontWeight: 700, fontFamily: "Lora, serif", color, marginBottom: 4 }}>{value}</div>
      <div style={{ fontSize: 11, color: "var(--muted)" }}>{sub}</div>
    </div>
  );

  const Panel = ({ title, children, onAdd, onViewAll }) => (
    <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, overflow: "hidden" }}>
      <div style={{ padding: "14px 18px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontSize: 12, fontFamily: "DM Mono, monospace", textTransform: "uppercase", letterSpacing: "0.08em", color: "var(--muted)" }}>{title}</span>
        <div style={{ display: "flex", gap: 6 }}>
          {onAdd && <Btn small variant="ghost" onClick={onAdd}>+ Nuevo</Btn>}
          {onViewAll && <Btn small variant="ghost" onClick={onViewAll}>Ver todos →</Btn>}
        </div>
      </div>
      {children}
    </div>
  );

  const ExpandRow = ({ id, main, sub, detail, dotColor = "var(--gold)" }) => {
    const isOpen = expandedRow === id;
    return (
      <>
        <div onClick={() => toggleRow(id)} style={{
          padding: "10px 18px", borderBottom: "1px solid var(--border)", display: "flex",
          alignItems: "center", gap: 10, cursor: "pointer", transition: "background 0.1s",
        }} onMouseEnter={e => e.currentTarget.style.background = "var(--hover)"}
          onMouseLeave={e => e.currentTarget.style.background = ""}>
          <div style={{ width: 7, height: 7, borderRadius: "50%", background: dotColor, flexShrink: 0 }} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{main}</div>
            <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 2 }}>{sub}</div>
          </div>
          <span style={{ color: "var(--muted)", fontSize: 11, transform: isOpen ? "rotate(180deg)" : "", transition: "transform 0.2s", flexShrink: 0 }}>▾</span>
        </div>
        {isOpen && (
          <div style={{ padding: "12px 18px 14px 35px", background: "var(--surface2)", borderBottom: "1px solid var(--border)", fontSize: 12, color: "var(--muted)", lineHeight: 1.8 }}>
            {detail}
          </div>
        )}
      </>
    );
  };

  return (
    <div style={{ padding: "32px 32px 32px" }}>
      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14, marginBottom: 24 }}>
        <StatCard label="Imputados" value={data.presos?.length || 0} sub={`${detenidos.length} detenidos · ${(data.presos?.length || 0) - detenidos.length} en libertad`} onClick={() => setView("presos")} />
        <StatCard label="Escritos en curso" value={data.escritos?.filter(e => e.status === "en_proceso").length || 0} sub={`${data.escritos?.filter(e => e.status === "presentado").length || 0} presentados`} color="var(--purple)" onClick={() => setView("escritos")} />
        <StatCard label="Vistas pendientes" value={data.vistas?.filter(v => v.estado === "pendiente").length || 0} sub={`${data.tareas?.filter(t => t.estado !== "completada" && t.prioridad === "alta").length || 0} tareas urgentes`} color="#e67e22" onClick={() => setView("vistas")} />
        <StatCard label="VL agendadas" value={data.vlGlobal?.filter(v => v.estado === "pendiente" || v.estado === "confirmado").length || 0} sub={`${data.patrocinios?.length || 0} patrocinios activos`} color="#3498db" onClick={() => setView("videollamadas")} />
      </div>

      {/* Panels grid */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        {/* Tareas urgentes */}
        <Panel title="⚑ Tareas urgentes" onViewAll={() => setView("tareas")}>
          {tareasUrg.length ? tareasUrg.map(t => (
            <ExpandRow key={t.id} id={`t-${t.id}`}
              dotColor={t.prioridad === "alta" ? "#e74c3c" : t.prioridad === "media" ? "#e67e22" : "#2ecc71"}
              main={t.titulo}
              sub={`SAC ${t.sac || "—"} · Vence: ${fd(t.vencimiento)}`}
              detail={<><div><b>Imputado:</b> {t.imputado || "—"}</div><div><b>Prioridad:</b> {t.prioridad}</div>{t.notas && <div style={{ marginTop: 4 }}>{t.notas}</div>}</>}
            />
          )) : <div style={{ padding: "18px", fontSize: 12, color: "var(--muted)" }}>Sin tareas urgentes ✓</div>}
        </Panel>

        {/* Próximas vistas */}
        <Panel title="◧ Próximas vistas" onViewAll={() => setView("vistas")}>
          {proxVistas.length ? proxVistas.map(v => (
            <ExpandRow key={v.id} id={`v-${v.id}`} dotColor="#3498db"
              main={v.titulo}
              sub={`${v.imputado} · ${fd(v.fechaVencimiento)}`}
              detail={<><div><b>Juzgado:</b> {v.juzgado || "—"}</div>{v.observacion && <div style={{ marginTop: 4 }}>{v.observacion}</div>}</>}
            />
          )) : <div style={{ padding: "18px", fontSize: 12, color: "var(--muted)" }}>Sin vistas pendientes ✓</div>}
        </Panel>

        {/* Escritos en curso */}
        <Panel title="✍ Escritos en curso" onViewAll={() => setView("escritos")}>
          {escPend.length ? escPend.map(e => (
            <ExpandRow key={e.id} id={`e-${e.id}`} dotColor="var(--purple)"
              main={e.titulo}
              sub={`${e.imputado || "Sin imputado"}${e.fechaVencimiento ? " · Vence: " + fd(e.fechaVencimiento) : ""}`}
              detail={<><div><b>Tipo:</b> {ESCRITO_TIPOS.find(x => x.val === e.tipo)?.label || e.tipo}</div>{e.juzgado && <div><b>Juzgado:</b> {e.juzgado}</div>}{e.descripcion && <div style={{ marginTop: 4 }}>{e.descripcion}</div>}</>}
            />
          )) : <div style={{ padding: "18px", fontSize: 12, color: "var(--muted)" }}>Sin escritos en proceso ✓</div>}
        </Panel>

        {/* Videollamadas */}
        <Panel title="◈ Videollamadas" onAdd={() => openModal("importarVL")} onViewAll={() => setView("videollamadas")}>
          {proxVL.length ? proxVL.map(v => (
            <ExpandRow key={v.id} id={`vl-${v.id}`}
              dotColor={v.estado === "confirmado" ? "#2ecc71" : v.estado === "realizado" ? "var(--muted)" : "#e67e22"}
              main={v.nombre || "—"}
              sub={`${fd(v.fecha)} ${v.hora || ""} · SAC ${v.sac || "—"}`}
              detail={<><div><b>Estado:</b> {v.estado}</div>{v.unidad && <div><b>Unidad:</b> {v.unidad}</div>}{v.notas && <div style={{ marginTop: 4 }}>{v.notas}</div>}</>}
            />
          )) : (
            <div style={{ padding: "18px", fontSize: 12, color: "var(--muted)", display: "flex", alignItems: "center", gap: 10 }}>
              Sin videollamadas
              <Btn small variant="ghost" onClick={() => openModal("importarVL")}>📧 Importar mail</Btn>
            </div>
          )}
        </Panel>
      </div>
    </div>
  );
}

const BadgePicker = ({ selected = [], onChange }) => {

  };

    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

            {group.badges.map(b => (
              <NumBadge key={b.id} badge={b} active={selected.includes(b.id)} onClick={() => toggle(b.id)} />

          </div>
        </div>
      ))}
    </div>
  );
};

// ─────────────────────────────────────────────────────────
// IMPUTADOS VIEW
// ─────────────────────────────────────────────────────────
function PresosView({ data, reload }) {
  const { toast } = useApp();
  const [activeFilters, setActiveFilters] = useState([]); // hashtag filter — array of badge ids
  const [search, setSearch] = useState("");
  const [expanded, setExpanded] = useState(null); // id of expanded card
  const [modalOpen, setModalOpen] = useState(false);
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);

  const allBadges = ALL_BADGE_GROUPS.flatMap(g => g.badges);

  // Filter: search + hashtag filters (AND logic — must have ALL selected)
  let list = data.presos || [];
  if (search) list = list.filter(p =>
    String(p.nombre || "").toLowerCase().includes(search.toLowerCase()) ||
    String(p.sac || "").includes(search) ||
    String(p.delito || "").toLowerCase().includes(search.toLowerCase())
  );
  if (activeFilters.length > 0) {
    list = list.filter(p =>
      activeFilters.every(fid => (p.badges || []).includes(fid))
    );
  }

  const toggleFilter = (bid) => setActiveFilters(prev =>
    prev.includes(bid) ? prev.filter(x => x !== bid) : [...prev, bid]
  );

  const openNew = () => {
    setForm({ badges: [], reincidente: false });
    setModalOpen(true);
  };
  const openEdit = (p, e) => {
    e && e.stopPropagation();
    setForm({ ...p, badges: p.badges || [] });
    setModalOpen(true);
  };
  const toggleExpand = (id) => setExpanded(prev => prev === id ? null : id);

  const save = async () => {
    if (!String(form.nombre || "").trim() || !String(form.sac || "").trim()) {
      toast("Nombre y SAC son requeridos", "warn"); return;
    }
    setSaving(true);
    try {
      if (form.id) { await api.update("presos", form.id, form); toast("Imputado actualizado"); }
      else { await api.create("presos", form); toast("Imputado creado"); }
      setModalOpen(false);
      await reload("presos");
    } catch (e) { toast(e.message, "error"); }
    setSaving(false);
  };

  const del = async (id, e) => {
    e && e.stopPropagation();
    if (!confirm("¿Eliminar este imputado?")) return;
    try { await api.delete("presos", id); await reload("presos"); toast("Eliminado"); }
    catch (e) { toast(e.message, "error"); }
  };

  const removeBadge = async (p, bid, e) => {
    e && e.stopPropagation();
    const updated = { ...p, badges: (p.badges || []).filter(x => x !== bid) };
    await api.update("presos", p.id, updated);
    await reload("presos");
  };

  const f = (k, v) => setForm(prev => ({ ...prev, [k]: v === undefined ? "" : v }));

  return (
    <div style={{ padding: 32 }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
        <h1 style={{ fontFamily: "Lora, serif", fontSize: 26, fontWeight: 700, color: "var(--text)" }}>
          Imputados <span style={{ fontSize: 14, color: "var(--muted)", fontFamily: "DM Sans, sans-serif", fontWeight: 400 }}>({list.length})</span>
        </h1>
        <Btn onClick={openNew}>+ Nuevo imputado</Btn>
      </div>

      {/* Search */}
      <input value={search} onChange={e => setSearch(e.target.value)}
        placeholder="Buscar por nombre, SAC, delito..."
        style={{ width: "100%", maxWidth: 400, background: "var(--input-bg)", border: "1.5px solid var(--border)", borderRadius: 8, padding: "8px 14px", fontSize: 13, color: "var(--text)", outline: "none", marginBottom: 14 }} />

      {/* Hashtag filter groups */}
      <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10, padding: "12px 16px", marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <span style={{ fontSize: 11, color: "var(--muted)", fontFamily: "DM Mono, monospace", textTransform: "uppercase", letterSpacing: "0.07em" }}>
            Filtrar por hashtag {activeFilters.length > 0 && <span style={{ color: "var(--accent)", fontWeight: 700 }}>({activeFilters.length} activos)</span>}
          </span>
          {activeFilters.length > 0 && (
            <button onClick={() => setActiveFilters([])} style={{ fontSize: 11, color: "var(--muted)", background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>Limpiar filtros</button>
          )}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {ALL_BADGE_GROUPS.map(group => (
            <div key={group.title} style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ fontSize: 10, color: "var(--muted)", fontFamily: "DM Mono, monospace", width: 90, flexShrink: 0, fontSize: 10 }}>{group.title}</span>
              {group.badges.map(b => (
                <button key={b.id} onClick={() => toggleFilter(b.id)} title={b.title} style={{
                  padding: "2px 9px", borderRadius: 5, border: "1.5px solid " + b.color,
                  background: activeFilters.includes(b.id) ? b.color : "transparent",
                  color: activeFilters.includes(b.id) ? "#fff" : b.color,
                  fontSize: 10, fontFamily: "DM Mono, monospace", fontWeight: 700,
                  cursor: "pointer", transition: "all 0.12s",
                }}>{b.label}</button>
              ))}
            </div>
          ))}
        </div>
      </div>

      {/* List */}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {list.map(p => {
          const isOpen = expanded === p.id;
          const pBadges = (p.badges || []).map(bid => allBadges.find(b => b.id === bid)).filter(Boolean);
          return (
            <div key={p.id} style={{
              background: "var(--surface)", border: "1px solid " + (isOpen ? "var(--accent)" : "var(--border)"),
              borderRadius: 12, overflow: "hidden", transition: "border-color 0.15s",
              cursor: "pointer",
            }} onClick={() => toggleExpand(p.id)}>
              {/* Card header — always visible */}
              <div style={{ padding: "14px 18px", display: "flex", alignItems: "flex-start", gap: 14 }}>
                <div style={{ paddingTop: 4, flexShrink: 0 }}>
                  <div style={{ width: 9, height: 9, borderRadius: "50%", background: pBadges.length ? pBadges[0].color : "var(--muted)" }} />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  {/* Name row */}
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 5 }}>
                    <span style={{ fontFamily: "Lora, serif", fontSize: 15, fontWeight: 700, color: "var(--text)" }}>{p.nombre}</span>
                    <span style={{ fontSize: 11, color: "var(--muted)", fontFamily: "DM Mono, monospace" }}>SAC {p.sac}</span>
                    {p.delito && <span style={{ fontSize: 11, color: "var(--muted)" }}>· {p.delito}</span>}
                    {p.ingreso && <span style={{ fontSize: 11, color: "var(--muted)" }}>· 📅 {fd(p.ingreso)}</span>}
                  </div>
                  {/* ALL badges always visible */}
                  <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                    {pBadges.map(b => (
                      <span key={b.id} title={b.title} onClick={e => removeBadge(p, b.id, e)} style={{
                        display: "inline-flex", alignItems: "center", gap: 3,
                        background: b.color, color: "#fff", borderRadius: 5,
                        padding: "2px 7px", fontSize: 10, fontFamily: "DM Mono, monospace",
                        fontWeight: 700, cursor: "pointer", userSelect: "none",
                      }}>{b.label} <span style={{ opacity: 0.7, fontSize: 8 }}>×</span></span>
                    ))}
                    {p.monto_abr_fi && <span style={{ fontSize: 10, color: "#e65100", background: "#e6510015", border: "1px solid #e6510044", borderRadius: 5, padding: "2px 7px", fontFamily: "DM Mono, monospace" }}>💰 {p.monto_abr_fi}</span>}
                    {p.monto_abr_cp && <span style={{ fontSize: 10, color: "#ad1457", background: "#ad145715", border: "1px solid #ad145744", borderRadius: 5, padding: "2px 7px", fontFamily: "DM Mono, monospace" }}>💰 {p.monto_abr_cp}</span>}
                    {pBadges.length === 0 && !p.monto_abr_fi && !p.monto_abr_cp && (
                      <span style={{ fontSize: 10, color: "var(--muted)", fontStyle: "italic" }}>Sin hashtags — click para agregar</span>
                    )}
                  </div>
                </div>
                <div onClick={e => e.stopPropagation()} style={{ display: "flex", gap: 5, flexShrink: 0, alignItems: "center" }}>
                  <span style={{ fontSize: 18, color: "var(--muted)", userSelect: "none", padding: "0 4px" }}>{isOpen ? "▲" : "▼"}</span>
                  <Btn small variant="ghost" onClick={e => openEdit(p, e)}>✏ Tags</Btn>
                  <Btn small variant="danger" onClick={e => del(p.id, e)}>✕</Btn>
                </div>
              </div>

              {/* Expanded detail */}
              {isOpen && (
                <div style={{ borderTop: "1px solid var(--border)", padding: "16px 18px 18px 18px", background: "var(--surface2)", animation: "slideIn 0.15s ease" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 24px", marginBottom: 12 }}>
                    {p.juzgado && <div><span style={{ fontSize: 10, color: "var(--muted)", fontFamily: "DM Mono, monospace", textTransform: "uppercase" }}>Juzgado</span><div style={{ fontSize: 13, color: "var(--text)", marginTop: 2 }}>{p.juzgado}</div></div>}
                    {p.fiscal && <div><span style={{ fontSize: 10, color: "var(--muted)", fontFamily: "DM Mono, monospace", textTransform: "uppercase" }}>Fiscal</span><div style={{ fontSize: 13, color: "var(--text)", marginTop: 2 }}>{p.fiscal}</div></div>}
                    {p.unidad && <div><span style={{ fontSize: 10, color: "var(--muted)", fontFamily: "DM Mono, monospace", textTransform: "uppercase" }}>Unidad penal</span><div style={{ fontSize: 13, color: "var(--text)", marginTop: 2 }}>{p.unidad}</div></div>}
                    {p.defensor && <div><span style={{ fontSize: 10, color: "var(--muted)", fontFamily: "DM Mono, monospace", textTransform: "uppercase" }}>Defensor</span><div style={{ fontSize: 13, color: "var(--text)", marginTop: 2 }}>{p.defensor}</div></div>}
                    {p.dni && <div><span style={{ fontSize: 10, color: "var(--muted)", fontFamily: "DM Mono, monospace", textTransform: "uppercase" }}>DNI</span><div style={{ fontSize: 13, color: "var(--text)", marginTop: 2 }}>{p.dni}</div></div>}
                    {p.reparticion && <div><span style={{ fontSize: 10, color: "var(--muted)", fontFamily: "DM Mono, monospace", textTransform: "uppercase" }}>Repartición</span><div style={{ fontSize: 13, color: "var(--text)", marginTop: 2 }}>{p.reparticion}</div></div>}
                  </div>
                  {p.situacionActual && (
                    <div style={{ padding: "10px 14px", background: "var(--surface)", borderRadius: 8, borderLeft: "3px solid var(--gold)", fontSize: 13, color: "var(--text)", lineHeight: 1.6, marginBottom: 10 }}>
                      {p.situacionActual}
                    </div>
                  )}
                  {p.antecedentes && (
                    <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 6 }}>
                      <span style={{ fontFamily: "DM Mono, monospace", textTransform: "uppercase", fontSize: 10 }}>Antecedentes: </span>{p.antecedentes}
                    </div>
                  )}
                  {p.notas && (
                    <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 6 }}>
                      <span style={{ fontFamily: "DM Mono, monospace", textTransform: "uppercase", fontSize: 10 }}>Notas: </span>{p.notas}
                    </div>
                  )}
                  <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
                    <Btn small onClick={e => openEdit(p, e)}>✏ Editar completo</Btn>
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {!list.length && (
          <div style={{ textAlign: "center", padding: 48, color: "var(--muted)", fontSize: 14 }}>
            {activeFilters.length > 0 ? "Ningún imputado tiene todos los hashtags seleccionados" : "No hay imputados cargados"}
          </div>
        )}
      </div>

      {/* Form Modal */}
      <Modal open={modalOpen} onClose={() => setModalOpen(false)} title={form.id ? "Editar imputado" : "Nuevo imputado"} wide>
        <Row2>
          <Input label="Nombre completo *" value={form.nombre} onChange={v => f("nombre", v)} placeholder="Apellido, Nombre" required />

          <Input label="DNI" value={form.dni} onChange={v => f("dni", v)} />

          <Input label="Juzgado / Fiscalía" value={form.juzgado} onChange={v => f("juzgado", v)} />

        </Row2>

          <Input label="Unidad penal" value={form.unidad} onChange={v => f("unidad", v)} />

        <Row2>
          <Select label="Defensor" value={form.defensor} onChange={v => f("defensor", v)} options={[{ value: "Titular", label: "Titular" }, { value: "Auxiliar", label: "Auxiliar" }]} />
          <Select label="Repartición" value={form.reparticion} onChange={v => f("reparticion", v)} options={[{ value: "", label: "—" }, { value: "Fiscalía de Instrucción", label: "Fiscalía de Instrucción" }, { value: "Cámara Penal", label: "Cámara Penal" }, { value: "Ejecución Penal", label: "Ejecución Penal" }]} />
        </Row2>
        <Row2>
          <Input label="Monto ofrecimiento abreviado F.I." value={form.monto_abr_fi} onChange={v => f("monto_abr_fi", v)} placeholder="Ej: 6 años" />
          <Input label="Monto ofrecimiento abreviado Cámara" value={form.monto_abr_cp} onChange={v => f("monto_abr_cp", v)} placeholder="Ej: 4 años" />
        </Row2>
        <Textarea label="Situación actual / estrategia de defensa" value={form.situacionActual} onChange={v => f("situacionActual", v)} />
        <Textarea label="Antecedentes" value={form.antecedentes} onChange={v => f("antecedentes", v)} />
        <Textarea label="Notas" value={form.notas} onChange={v => f("notas", v)} rows={2} />
        <div style={{ marginBottom: 14 }}>
          <label style={{ display: "block", fontSize: 11, color: "var(--muted)", marginBottom: 10, fontFamily: "DM Mono, monospace", textTransform: "uppercase", letterSpacing: "0.07em" }}>
            Hashtags / Categorías <span style={{ opacity: 0.6, fontWeight: 400 }}>(click para agregar o quitar)</span>
          </label>
          <BadgePicker selected={form.badges || []} onChange={v => f("badges", v)} />
        </div>
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 8 }}>
          <Btn variant="ghost" onClick={() => setModalOpen(false)}>Cancelar</Btn>
          <Btn onClick={save} disabled={saving}>{saving ? "Guardando..." : form.id ? "Guardar cambios" : "Crear imputado"}</Btn>
        </div>
      </Modal>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// ESCRITOS VIEW
// ─────────────────────────────────────────────────────────
function EscritosView({ data, reload }) {
  const { toast } = useApp();
  const [filter, setFilter] = useState("todos");
  const [modalOpen, setModalOpen] = useState(false);
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);

  const f = (k, v) => setForm(p => ({ ...p, [k]: v }));
  let list = data.escritos || [];
  if (filter !== "todos") list = list.filter(e => e.status === filter);
  list = [...list].sort((a, b) => (b.fechaCreacion || "").localeCompare(a.fechaCreacion || ""));

  const openNew = () => { setForm({ status: "en_proceso", fechaCreacion: today() }); setModalOpen(true); };
  const openEdit = (e) => { setForm({ ...e }); setModalOpen(true); };

  const save = async () => {
    if (!form.tipo || !String(form.titulo || '').trim()) { toast("Tipo y título son requeridos", "warn"); return; }
    setSaving(true);
    try {
      if (form.id) { await api.update("escritos", form.id, form); toast("Escrito actualizado"); }
      else { await api.create("escritos", form); toast("Escrito creado"); }
      setModalOpen(false);
      await reload("escritos");
    } catch (e) { toast(e.message, "error"); }
    setSaving(false);
  };

  const del = async (id) => {
    if (!confirm("¿Eliminar?")) return;
    try { await api.delete("escritos", id); await reload("escritos"); } catch (e) { toast(e.message, "error"); }
  };

  const changeStatus = async (escrito, newStatus) => {
    try {
      await api.update("escritos", escrito.id, { ...escrito, status: newStatus });
      await reload("escritos");
    } catch (e) { toast(e.message, "error"); }
  };

  const presoOpts = [{ value: "", label: "Sin imputado" }, ...(data.presos || []).map(p => ({ value: p.nombre, label: `${p.nombre} (SAC ${p.sac})` }))];

  return (
    <div style={{ padding: 32 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
        <h1 style={{ fontFamily: "Lora, serif", fontSize: 26, fontWeight: 700, color: "var(--text)" }}>Escritos en Curso</h1>
        <Btn onClick={openNew}>+ Nuevo escrito</Btn>
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {[["todos", "Todos"], ["en_proceso", "En Proceso"], ["presentado", "Presentados"], ["resuelto", "Resueltos"]].map(([val, lbl]) => (
          <button key={val} onClick={() => setFilter(val)} style={{
            padding: "6px 14px", borderRadius: 8, border: "1.5px solid", cursor: "pointer", fontSize: 12, fontFamily: "DM Sans, sans-serif", fontWeight: 600,
            borderColor: filter === val ? "var(--accent)" : "var(--border)",
            background: filter === val ? "var(--accent-light)" : "transparent",
            color: filter === val ? "var(--accent)" : "var(--muted)",
          }}>{lbl}</button>
        ))}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {list.map(e => {
          const tiLabel = ESCRITO_TIPOS.find(t => t.val === e.tipo)?.label || "Otro";
          const tiColor = TIPO_COLORS[e.tipo] || "#546e7a";
          const stColor = STATUS_COLORS[e.status] || "var(--muted)";
          return (
            <div key={e.id} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: "16px 20px", display: "flex", alignItems: "flex-start", gap: 14 }}>
              <div>
                <span style={{ display: "inline-block", padding: "3px 10px", borderRadius: 20, fontSize: 10, fontFamily: "DM Mono, monospace", textTransform: "uppercase", letterSpacing: "0.07em", fontWeight: 700, background: tiColor + "22", color: tiColor, border: `1px solid ${tiColor}44` }}>{tiLabel}</span>
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text)", marginBottom: 5 }}>{e.titulo}</div>
                <div style={{ fontSize: 12, color: "var(--muted)", display: "flex", gap: 12, flexWrap: "wrap" }}>
                  {e.imputado && <span>👤 {e.imputado}</span>}
                  {e.sac && <span>SAC {e.sac}</span>}
                  {e.fechaVencimiento && <span style={{ color: "#e67e22" }}>⏱ Vence: {fd(e.fechaVencimiento)}</span>}
                  {e.juzgado && <span>🏛 {e.juzgado}</span>}
                  <span>📅 {fd(e.fechaCreacion)}</span>
                </div>
                {e.descripcion && <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 6, lineHeight: 1.5 }}>{e.descripcion}</div>}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, alignItems: "flex-end", flexShrink: 0 }}>
                <select value={e.status} onChange={ev => changeStatus(e, ev.target.value)} style={{ background: stColor + "22", border: `1.5px solid ${stColor}`, borderRadius: 6, padding: "4px 8px", fontSize: 11, color: stColor, fontFamily: "DM Mono, monospace", cursor: "pointer", outline: "none", fontWeight: 700 }}>
                  {ESCRITO_STATUS.map(s => <option key={s.val} value={s.val}>{s.label}</option>)}
                </select>
                <div style={{ display: "flex", gap: 6 }}>
                  <Btn small variant="ghost" onClick={() => openEdit(e)}>✏</Btn>
                  <Btn small variant="danger" onClick={() => del(e.id)}>✕</Btn>
                </div>
              </div>
            </div>
          );
        })}
        {!list.length && <div style={{ textAlign: "center", padding: 48, color: "var(--muted)", fontSize: 14 }}>No hay escritos{filter !== "todos" ? " en este estado" : ""}</div>}
      </div>

      <Modal open={modalOpen} onClose={() => setModalOpen(false)} title={form.id ? "Editar escrito" : "Nuevo escrito"}>
        <Row2>
          <Select label="Tipo *" value={form.tipo} onChange={v => f("tipo", v)} required options={[{ value: "", label: "Seleccionar..." }, ...ESCRITO_TIPOS.map(t => ({ value: t.val, label: t.label }))]} />
          <Select label="Estado" value={form.status} onChange={v => f("status", v)} options={ESCRITO_STATUS.map(s => ({ value: s.val, label: s.label }))} />
        </Row2>
        <Input label="Título *" value={form.titulo} onChange={v => f("titulo", v)} placeholder="Ej: Oposición a elevación — Carballo" required />
        <Row2>
          <Select label="Imputado relacionado" value={form.imputado} onChange={v => { f("imputado", v); const p = (data.presos || []).find(p => p.nombre === v); if (p) f("sac", p.sac); }} options={presoOpts} />
          <Input label="SAC" value={form.sac} onChange={v => f("sac", v)} />
        </Row2>
        <Row2>
          <Input label="Juzgado" value={form.juzgado} onChange={v => f("juzgado", v)} />
          <Input label="Vencimiento" value={form.fechaVencimiento} onChange={v => f("fechaVencimiento", v)} type="date" />
        </Row2>
        <Row2>
          <Input label="Fecha presentación" value={form.fechaPresentacion} onChange={v => f("fechaPresentacion", v)} type="date" />
          <Input label="Fecha creación" value={form.fechaCreacion} onChange={v => f("fechaCreacion", v)} type="date" />
        </Row2>
        <Textarea label="Descripción / notas" value={form.descripcion} onChange={v => f("descripcion", v)} />
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <Btn variant="ghost" onClick={() => setModalOpen(false)}>Cancelar</Btn>
          <Btn onClick={save} disabled={saving}>{saving ? "Guardando..." : form.id ? "Guardar" : "Agregar escrito"}</Btn>
        </div>
      </Modal>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// GENERIC LIST VIEW (Tareas, Vistas, Novedades)
// ─────────────────────────────────────────────────────────
function TareasView({ data, reload }) {
  const { toast } = useApp();
  const [filter, setFilter] = useState("pendiente");
  const [search, setSearch] = useState("");
  const [expanded, setExpanded] = useState(null);
  const [expandedDays, setExpandedDays] = useState({});
  const [modalOpen, setModalOpen] = useState(false);
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);
  const [prioFilter, setPrioFilter] = useState("");
  const f = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const allTareas = data.tareas || [];

  // Pending/active list
  let pendientes = allTareas.filter(t => t.estado !== "completada");
  pendientes = [...pendientes].sort((a, b) =>
    ({ alta: 0, media: 1, baja: 2 }[a.prioridad] - { alta: 0, media: 1, baja: 2 }[b.prioridad] || 0)
  );

  // Completed — grouped by day
  const completadas = allTareas.filter(t => t.estado === "completada");

  // Search applies across all
  const searchLower = search.toLowerCase();
  const matchSearch = t =>
    !search ||
    String(t.titulo || "").toLowerCase().includes(searchLower) ||
    String(t.imputado || "").toLowerCase().includes(searchLower) ||
    String(t.sac || "").includes(search) ||
    String(t.notas || "").toLowerCase().includes(searchLower);

  const pendientesFiltradas = pendientes.filter(t => matchSearch(t) && (!prioFilter || t.prioridad === prioFilter));

  // Group completadas by fechaCompletada
  const historial = {};
  completadas.filter(matchSearch).forEach(t => {
    const dia = t.fechaCompletada || "Sin fecha";
    if (!historial[dia]) historial[dia] = [];
    historial[dia].push(t);
  });
  const diasOrdenados = Object.keys(historial).sort((a, b) => b.localeCompare(a));

  const toggleDay = (dia) => setExpandedDays(prev => ({ ...prev, [dia]: !prev[dia] }));

  const openNew = () => { setForm({ prioridad: "media", estado: "pendiente", fechaCreacion: today() }); setModalOpen(true); };
  const openEdit = (t, e) => { e.stopPropagation(); setForm({ ...t }); setModalOpen(true); };

  const toggle = async (t, e) => {
    e.stopPropagation();
    try {
      const completada = t.estado !== "completada";
      const updated = { ...t, estado: completada ? "completada" : "pendiente", fechaCompletada: completada ? today() : null };
      await api.update("tareas", t.id, updated);
      await reload("tareas");
      toast(completada ? "Tarea completada ✓" : "Tarea reabierta");
    } catch(err) { toast(err.message, "error"); }
  };

  const save = async () => {
    if (!String(form.titulo || "").trim()) { toast("Título requerido", "warn"); return; }
    setSaving(true);
    try {
      if (form.id) { await api.update("tareas", form.id, form); }
      else { await api.create("tareas", { ...form, fechaCreacion: today() }); }
      setModalOpen(false); await reload("tareas"); toast("Guardado");
    } catch(err) { toast(err.message, "error"); }
    setSaving(false);
  };

  const del = async (id, e) => {
    e.stopPropagation();
    if (!confirm("¿Eliminar?")) return;
    await api.delete("tareas", id); await reload("tareas");
  };

  const presoOpts = [{ value: "", label: "—" }, ...(data.presos || []).map(p => ({ value: p.nombre, label: p.nombre + " (SAC " + p.sac + ")" }))];
  const prioColor = { alta: "#e74c3c", media: "#e67e22", baja: "#2ecc71" };
  const prioLabel = { alta: "Alta", media: "Media", baja: "Baja" };

  const TareaCard = ({ t }) => {
    const isOpen = expanded === t.id;
    return (
      <div onClick={() => setExpanded(prev => prev === t.id ? null : t.id)}
        style={{ background: "var(--surface)", border: "1px solid " + (isOpen ? "var(--gold)" : "var(--border)"), borderRadius: 12, overflow: "hidden", opacity: t.estado === "completada" ? 0.7 : 1, cursor: "pointer", transition: "border-color 0.15s" }}>
        <div style={{ padding: "14px 18px", display: "flex", alignItems: "center", gap: 12 }}>
          <div onClick={e => toggle(t, e)} style={{ width: 18, height: 18, borderRadius: 5, border: "2px solid " + (t.estado === "completada" ? "var(--gold)" : "var(--border)"), background: t.estado === "completada" ? "var(--gold)" : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: "#0a0a0f", fontSize: 11, flexShrink: 0 }}>{t.estado === "completada" ? "✓" : ""}</div>
          <div style={{ width: 7, height: 7, borderRadius: "50%", background: prioColor[t.prioridad] || "var(--muted)", flexShrink: 0 }} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text)", textDecoration: t.estado === "completada" ? "line-through" : "none" }}>{t.titulo}</div>
            <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 2 }}>
              {t.imputado && <span>{t.imputado} · </span>}
              {t.vencimiento && <span>Vence: {fd(t.vencimiento)} · </span>}
              <span>{prioLabel[t.prioridad] || t.prioridad}</span>
              {t.fechaCompletada && <span> · ✓ {fd(t.fechaCompletada)}</span>}
            </div>
          </div>
          <div onClick={e => e.stopPropagation()} style={{ display: "flex", gap: 6, flexShrink: 0 }}>
            <span style={{ fontSize: 14, color: "var(--muted)", padding: "0 2px" }}>{isOpen ? "▲" : "▼"}</span>
            <Btn small variant="ghost" onClick={e => openEdit(t, e)}>✏</Btn>
            <Btn small variant="danger" onClick={e => del(t.id, e)}>✕</Btn>
          </div>
        </div>
        {isOpen && (
          <div style={{ borderTop: "1px solid var(--border)", padding: "14px 18px", background: "var(--surface2)", animation: "slideIn 0.15s ease" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 24px" }}>
              {t.sac && <div><span style={{ fontSize: 10, color: "var(--muted)", fontFamily: "DM Mono, monospace", textTransform: "uppercase" }}>SAC</span><div style={{ fontSize: 13, color: "var(--text)", marginTop: 2 }}>{t.sac}</div></div>}
              {t.vencimiento && <div><span style={{ fontSize: 10, color: "var(--muted)", fontFamily: "DM Mono, monospace", textTransform: "uppercase" }}>Vencimiento</span><div style={{ fontSize: 13, color: "var(--text)", marginTop: 2 }}>{fd(t.vencimiento)}</div></div>}
              {t.fechaCreacion && <div><span style={{ fontSize: 10, color: "var(--muted)", fontFamily: "DM Mono, monospace", textTransform: "uppercase" }}>Creada</span><div style={{ fontSize: 13, color: "var(--text)", marginTop: 2 }}>{fd(t.fechaCreacion)}</div></div>}
              {t.fechaCompletada && <div><span style={{ fontSize: 10, color: "var(--muted)", fontFamily: "DM Mono, monospace", textTransform: "uppercase" }}>Completada</span><div style={{ fontSize: 13, color: "var(--gold)", marginTop: 2, fontWeight: 600 }}>{fd(t.fechaCompletada)}</div></div>}
            </div>
            {t.notas && <div style={{ marginTop: 10, padding: "10px 12px", background: "var(--surface)", borderRadius: 8, borderLeft: "3px solid var(--gold)", fontSize: 13, color: "var(--text)", lineHeight: 1.6, userSelect: "text" }}>{t.notas}</div>}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{ padding: 32 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
        <h1 style={{ fontFamily: "Lora, serif", fontSize: 26, fontWeight: 700, color: "var(--text)" }}>Tareas</h1>
        <Btn onClick={openNew}>+ Nueva tarea</Btn>
      </div>

      {/* Search */}
      <input value={search} onChange={e => setSearch(e.target.value)}
        placeholder="Buscar por título, imputado, SAC, notas..."
        style={{ width: "100%", maxWidth: 420, background: "var(--input-bg)", border: "1.5px solid var(--border)", borderRadius: 8, padding: "8px 14px", fontSize: 13, color: "var(--text)", outline: "none", marginBottom: 16 }} />

      {/* Tabs + prioridad filter */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
        {[["pendiente", "Pendientes (" + pendientesFiltradas.length + ")"], ["completada", "Historial completadas"]].map(([v, l]) => (
          <button key={v} onClick={() => setFilter(v)} style={{ padding: "6px 16px", borderRadius: 8, border: "1.5px solid", cursor: "pointer", fontSize: 12, fontFamily: "DM Sans, sans-serif", fontWeight: 600, borderColor: filter === v ? "var(--gold)" : "var(--border)", background: filter === v ? "rgba(212,175,55,0.1)" : "transparent", color: filter === v ? "var(--gold)" : "var(--muted)" }}>{l}</button>
        ))}
        <div style={{ width: 1, height: 20, background: "var(--border)", margin: "0 4px" }} />
        {[["", "Todas"], ["alta", "🔴 Alta"], ["media", "🟠 Media"], ["baja", "🟢 Baja"]].map(([v, l]) => (
          <button key={v} onClick={() => setPrioFilter(v)} style={{ padding: "6px 12px", borderRadius: 8, border: "1.5px solid", cursor: "pointer", fontSize: 12, fontFamily: "DM Sans, sans-serif", fontWeight: 600, borderColor: prioFilter === v ? "var(--accent)" : "var(--border)", background: prioFilter === v ? "var(--accent-light)" : "transparent", color: prioFilter === v ? "var(--accent)" : "var(--muted)" }}>{l}</button>
        ))}
      </div>

      {/* Pendientes */}
      {filter === "pendiente" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {pendientesFiltradas.map(t => <TareaCard key={t.id} t={t} />)}
          {!pendientesFiltradas.length && <div style={{ textAlign: "center", padding: 48, color: "var(--muted)" }}>{search ? "No hay tareas que coincidan" : "No hay tareas pendientes ✓"}</div>}
        </div>
      )}

      {/* Historial completadas agrupado por día */}
      {filter === "completada" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {diasOrdenados.length === 0 && <div style={{ textAlign: "center", padding: 48, color: "var(--muted)" }}>{search ? "No hay tareas que coincidan" : "No hay tareas completadas aún"}</div>}
          {diasOrdenados.map(dia => (
            <div key={dia} style={{ border: "1px solid var(--border)", borderRadius: 12, overflow: "hidden" }}>
              {/* Day header */}
              <div onClick={() => toggleDay(dia)} style={{ padding: "12px 18px", background: "var(--surface)", display: "flex", alignItems: "center", justifyContent: "space-between", cursor: "pointer" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: "var(--text)", fontFamily: "DM Mono, monospace" }}>📅 {dia === "Sin fecha" ? "Sin fecha" : fd(dia)}</span>
                  <span style={{ fontSize: 11, color: "var(--muted)", background: "var(--surface2)", borderRadius: 10, padding: "1px 8px" }}>{historial[dia].length} tarea{historial[dia].length !== 1 ? "s" : ""}</span>
                </div>
                <span style={{ color: "var(--muted)", fontSize: 14 }}>{expandedDays[dia] ? "▲" : "▼"}</span>
              </div>
              {/* Day tasks */}
              {expandedDays[dia] && (
                <div style={{ padding: "8px 12px 12px", background: "var(--surface2)", display: "flex", flexDirection: "column", gap: 6 }}>
                  {historial[dia].map(t => <TareaCard key={t.id} t={t} />)}
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Form Modal */}
      <Modal open={modalOpen} onClose={() => setModalOpen(false)} title={form.id ? "Editar tarea" : "Nueva tarea"}>
        <Input label="Título *" value={form.titulo} onChange={v => f("titulo", v)} required />
        <Row2>
          <Select label="Prioridad" value={form.prioridad} onChange={v => f("prioridad", v)} options={[{ value: "alta", label: "Alta" }, { value: "media", label: "Media" }, { value: "baja", label: "Baja" }]} />
          <Select label="Estado" value={form.estado} onChange={v => f("estado", v)} options={[{ value: "pendiente", label: "Pendiente" }, { value: "completada", label: "Completada" }]} />
        </Row2>
        <Row2>
          <Select label="Imputado" value={form.imputado} onChange={v => { f("imputado", v); const p = (data.presos || []).find(p => p.nombre === v); if (p) f("sac", p.sac); }} options={presoOpts} />
          <Input label="SAC" value={form.sac} onChange={v => f("sac", v)} />
        </Row2>
        <Input label="Vencimiento" value={form.vencimiento} onChange={v => f("vencimiento", v)} type="date" />
        <Textarea label="Notas" value={form.notas} onChange={v => f("notas", v)} rows={3} />
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 8 }}>
          <Btn variant="ghost" onClick={() => setModalOpen(false)}>Cancelar</Btn>
          <Btn onClick={save} disabled={saving}>{saving ? "Guardando..." : "Guardar"}</Btn>
        </div>
      </Modal>
    </div>
  );
}

function VideollamadasView({ data, reload }) {
  const { toast } = useApp();
  const [filter, setFilter] = useState("pendiente");
  const [importModal, setImportModal] = useState(false);
  const [solicitudOpen, setSolicitudOpen] = useState(false);
  const [mailText, setMailText] = useState("");
  const [parsedTurnos, setParsedTurnos] = useState([]);
  const [selectedTurnos, setSelectedTurnos] = useState([]);
  const [saving, setSaving] = useState(false);

  // Solicitud VL state
  const [solSearch, setSolSearch] = useState("");
  const [solSelected, setSolSelected] = useState([]); // array of preso ids
  const [solStep, setSolStep] = useState("select"); // "select" | "confirm" | "mail"
  const [dniEdits, setDniEdits] = useState({}); // id -> dni temporal
  const [savingDni, setSavingDni] = useState(false);

  let list = data.vlGlobal || [];
  if (filter !== "todos") list = list.filter(v => v.estado === filter);
  list = [...list].sort((a, b) => ((a.fecha || "") + (a.hora || "")).localeCompare((b.fecha || "") + (b.hora || "")));

  const changeStatus = async (v, estado) => {
    try { await api.update("vlGlobal", v.id, { ...v, estado }); await reload("vlGlobal"); }
    catch (e) { toast(e.message, "error"); }
  };

  // Solicitud helpers
  const presosFiltered = (data.presos || []).filter(p => {
    if (!solSearch) return true;
    const s = solSearch.toLowerCase();
    return String(p.nombre || "").toLowerCase().includes(s) || String(p.sac || "").includes(solSearch);
  });

  const toggleSolPreso = (id) => setSolSelected(prev =>
    prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
  );

  const selectedPresos = (data.presos || []).filter(p => solSelected.includes(p.id));
  const missingDni = selectedPresos.filter(p => !p.dni && !dniEdits[p.id]);

  const saveDniAndProceed = async () => {
    setSavingDni(true);
    try {
      for (const p of selectedPresos) {
        const dni = dniEdits[p.id];
        if (dni && !p.dni) {
          await api.update("presos", p.id, { ...p, dni });
        }
      }
      await reload("presos");
      setSolStep("mail");
    } catch(e) { toast(e.message, "error"); }
    setSavingDni(false);
  };

  const buildMail = () => {
    const hoy = new Date().toLocaleDateString("es-AR", { day: "2-digit", month: "2-digit", year: "numeric" });
    let body = "Coordinación de Videollamadas:\n\n";
    body += "Por medio de la presente, la Defensoría Pública del Primer Turno de Bell Ville solicita se gestionen videollamadas para las siguientes personas privadas de libertad:\n\n";
    selectedPresos.forEach((p, i) => {
      const dni = p.dni || dniEdits[p.id] || "—";
      body += (i + 1) + ". " + p.nombre + " | SAC: " + p.sac + " | DNI: " + dni + "\n";
    });
    body += "\nQuedamos a disposición para cualquier consulta.\n\nSaluda atte.,\nDefensoría Pública - Bell Ville\n" + hoy;
    return body;
  };

  const closeSolicitud = () => {
    setSolicitudOpen(false);
    setSolSearch("");
    setSolSelected([]);
    setSolStep("select");
    setDniEdits({});
  };

  // Parse mail (existing)
  const parseMail = () => {
    if (!mailText.trim()) { toast("Pegá el contenido del mail", "warn"); return; }
    const mesesMap = { enero: "01", febrero: "02", marzo: "03", abril: "04", mayo: "05", junio: "06", julio: "07", agosto: "08", septiembre: "09", octubre: "10", noviembre: "11", diciembre: "12" };
    const lines = mailText.split("\n");
    let fechaGlobal = "";
    const turnos = [];
    lines.forEach(line => {
      const m1 = line.match(/(\d{1,2})\s+de\s+(\w+)(?:\s+de\s+(\d{4}))?/i);
      if (m1 && mesesMap[m1[2].toLowerCase()]) { const yr = m1[3] || new Date().getFullYear(); fechaGlobal = yr + "-" + mesesMap[m1[2].toLowerCase()] + "-" + m1[1].padStart(2, "0"); }
      const m2 = line.match(/fecha[:\s]+(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/i);
      if (m2) { const yr = m2[3].length === 2 ? "20" + m2[3] : m2[3]; fechaGlobal = yr + "-" + m2[2].padStart(2, "0") + "-" + m2[1].padStart(2, "0"); }
    });
    lines.forEach(raw => {
      const line = raw.trim();
      if (!line || line.length < 4) return;
      if (/^(de:|para:|cc:|asunto|estimad|saludos|atte|firma|----)/i.test(line)) return;
      let nombre = "", sac = "", hora = "", unidad = "", fecha = fechaGlobal;
      const mH = line.match(/\b(\d{1,2})[:\.](\d{2})\s*(hs?|hrs?)?\b/i);
      if (mH) hora = mH[1].padStart(2, "0") + ":" + mH[2];
      const mH2 = !mH && line.match(/\b(\d{1,2})\s*hs?\b/i);
      if (mH2) hora = mH2[1].padStart(2, "0") + ":00";
      const mS = line.match(/(?:SAC|N[°º]|#)\s*:?\s*(\d{5,10})/i);
      if (mS) sac = mS[1];
      const mU = line.match(/\b(UP\s*\d+|Bouwer|Cruz del Eje|Río? Cuarto|San Martín|Bell Ville|Villa María|Montecristo)/i);
      if (mU) unidad = mU[1];
      const mFL = line.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
      if (mFL) { const yr = mFL[3].length === 2 ? "20" + mFL[3] : mFL[3]; fecha = yr + "-" + mFL[2].padStart(2, "0") + "-" + mFL[1].padStart(2, "0"); }
      const cleaned = line.replace(/(?:SAC|N[°º]|#)\s*:?\s*\d+/gi, "").replace(/\b\d{1,2}[:\.]?\d{0,2}\s*(hs?|hrs?)/gi, "").replace(/\b(UP\s*\d+|Bouwer|Cruz del Eje|Río? Cuarto|San Martín|Bell Ville|Villa María|Montecristo)\b/gi, "").replace(/\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/g, "").replace(/^[-•·|\*\t\s]+/, "").replace(/[-•·|\s]+$/, "").replace(/\s+/g, " ").trim();
      if (cleaned.length >= 3 && /[a-záéíóúñA-ZÁÉÍÓÚÑ]/.test(cleaned)) nombre = cleaned;
      if ((nombre || sac) && (hora || fecha)) {
        const preso = (data.presos || []).find(p => (sac && p.sac === sac) || (nombre && p.nombre.toLowerCase().includes(nombre.toLowerCase().split(" ")[0])));
        if (preso) { if (!nombre) nombre = preso.nombre; if (!sac) sac = preso.sac; if (!unidad && preso.unidad) unidad = preso.unidad; }
        turnos.push({ nombre, sac, fecha, hora, unidad, estado: "pendiente" });
      }
    });
    setParsedTurnos(turnos);
    setSelectedTurnos(turnos.map((_, i) => i));
    if (!turnos.length) toast("No se encontraron turnos en el texto", "warn");
  };

  const guardarTurnos = async () => {
    const items = selectedTurnos.map(i => ({ ...parsedTurnos[i], id: uid() }));
    if (!items.length) { toast("Seleccioná al menos un turno", "warn"); return; }
    setSaving(true);
    try {
      await api.batchCreate("vlGlobal", items);
      await reload("vlGlobal");
      setImportModal(false);
      setMailText(""); setParsedTurnos([]); setSelectedTurnos([]);
      toast(items.length + " turno" + (items.length !== 1 ? "s" : "") + " guardado" + (items.length !== 1 ? "s" : ""));
    } catch (e) { toast(e.message, "error"); }
    setSaving(false);
  };

  const stColor = { pendiente: "#e67e22", confirmado: "#2ecc71", realizado: "var(--muted)", cancelado: "#e74c3c" };

  return (
    <div style={{ padding: 32 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
        <h1 style={{ fontFamily: "Lora, serif", fontSize: 26, fontWeight: 700, color: "var(--text)" }}>Videollamadas</h1>
        <div style={{ display: "flex", gap: 8 }}>
          <Btn variant="ghost" onClick={() => { setSolicitudOpen(true); setSolStep("select"); }}>📨 Solicitar VL</Btn>
          <Btn onClick={() => setImportModal(true)}>📧 Importar mail de Karina</Btn>
        </div>
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {[["pendiente", "Pendientes"], ["confirmado", "Confirmadas"], ["realizado", "Realizadas"], ["todos", "Todas"]].map(([v, l]) => (
          <button key={v} onClick={() => setFilter(v)} style={{ padding: "6px 14px", borderRadius: 8, border: "1.5px solid", cursor: "pointer", fontSize: 12, fontFamily: "DM Sans, sans-serif", fontWeight: 600, borderColor: filter === v ? "var(--gold)" : "var(--border)", background: filter === v ? "var(--gold)15" : "transparent", color: filter === v ? "var(--gold)" : "var(--muted)" }}>{l}</button>
        ))}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {list.map(v => (
          <div key={v.id} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, padding: "14px 18px", display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: stColor[v.estado] || "var(--muted)", flexShrink: 0 }} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text)" }}>{v.nombre || "—"}</div>
              <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 3 }}>
                <span>{fd(v.fecha)} {v.hora && v.hora + " hs"}</span>
                {v.sac && <span> · SAC {v.sac}</span>}
                {v.unidad && <span> · {v.unidad}</span>}
              </div>
            </div>
            <Badge label={v.estado} color={stColor[v.estado] || "var(--muted)"} />
            <div style={{ display: "flex", gap: 6 }}>
              {v.estado === "pendiente" && <Btn small variant="ghost" onClick={() => changeStatus(v, "confirmado")}>✓ Confirmar</Btn>}
              {(v.estado === "pendiente" || v.estado === "confirmado") && <Btn small variant="ghost" onClick={() => changeStatus(v, "realizado")}>Realizada</Btn>}
              <Btn small variant="danger" onClick={() => changeStatus(v, "cancelado")}>✕</Btn>
            </div>
          </div>
        ))}
        {!list.length && <div style={{ textAlign: "center", padding: 48, color: "var(--muted)" }}>No hay videollamadas agendadas</div>}
      </div>

      {/* ── SOLICITUD VL MODAL ── */}
      <Modal open={solicitudOpen} onClose={closeSolicitud} title="📨 Solicitar Videollamadas" wide>

        {/* STEP 1: Select presos */}
        {solStep === "select" && (
          <div>
            <p style={{ fontSize: 13, color: "var(--muted)", marginBottom: 14 }}>
              Buscá y seleccioná los imputados para los que querés solicitar videollamada.
            </p>
            <input value={solSearch} onChange={e => setSolSearch(e.target.value)}
              placeholder="Buscar por nombre o SAC..."
              autoFocus
              style={{ width: "100%", background: "var(--input-bg)", border: "1.5px solid var(--border)", borderRadius: 8, padding: "9px 14px", fontSize: 13, color: "var(--text)", outline: "none", marginBottom: 12 }} />
            <div style={{ maxHeight: 320, overflowY: "auto", display: "flex", flexDirection: "column", gap: 6, marginBottom: 16 }}>
              {presosFiltered.length === 0 && <div style={{ textAlign: "center", padding: 24, color: "var(--muted)", fontSize: 13 }}>Sin resultados</div>}
              {presosFiltered.map(p => {
                const sel = solSelected.includes(p.id);
                return (
                  <div key={p.id} onClick={() => toggleSolPreso(p.id)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderRadius: 10, border: "1.5px solid " + (sel ? "var(--gold)" : "var(--border)"), background: sel ? "rgba(212,175,55,0.08)" : "var(--surface)", cursor: "pointer", transition: "all 0.12s" }}>

      {/* Import modal */}
      <Modal open={importModal} onClose={() => { setImportModal(false); setParsedTurnos([]); setMailText(""); }} title="📧 Importar turnos — Mail de Karina Martín" wide>
        <div style={{ fontSize: 12, color: "var(--muted)", lineHeight: 1.6, marginBottom: 14 }}>

function NovedadesView({ data, reload }) {
  const { toast } = useApp();
  const [modalOpen, setModalOpen] = useState(false);
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);
  const f = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const list = [...(data.novedades || [])].sort((a, b) => (b.fecha || "").localeCompare(a.fecha || ""));
  const save = async () => {
    if (!String(form.titulo || '').trim()) { toast("Título requerido", "warn"); return; }
    setSaving(true);
    try {
      if (form.id) { await api.update("novedades", form.id, form); } else { await api.create("novedades", { ...form, fecha: form.fecha || today() }); }
      setModalOpen(false); await reload("novedades"); toast("Guardado");
    } catch (e) { toast(e.message, "error"); }
    setSaving(false);
  };
  const del = async (id) => { if (!confirm("¿Eliminar?")) return; await api.delete("novedades", id); await reload("novedades"); };
  const presoOpts = [{ value: "", label: "—" }, ...(data.presos || []).map(p => ({ value: p.nombre, label: `${p.nombre} (SAC ${p.sac})` }))];
  const tipoColors = { audiencia: "#3498db", resolucion: "var(--gold)", novedad: "var(--muted)", urgente: "#e74c3c" };

  return (
    <div style={{ padding: 32 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
        <h1 style={{ fontFamily: "Lora, serif", fontSize: 26, fontWeight: 700, color: "var(--text)" }}>Novedades</h1>
        <Btn onClick={() => { setForm({ tipo: "novedad", fecha: today() }); setModalOpen(true); }}>+ Nueva novedad</Btn>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {list.map(n => (
          <div key={n.id} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, padding: "14px 18px", display: "flex", gap: 14 }}>
            <div style={{ width: 3, borderRadius: 4, background: tipoColors[n.tipo] || "var(--muted)", flexShrink: 0 }} />
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: "var(--text)" }}>{n.titulo}</span>
                {n.tipo && <Badge label={n.tipo} color={tipoColors[n.tipo] || "var(--muted)"} />}
              </div>
              <div style={{ fontSize: 11, color: "var(--muted)", marginBottom: 5 }}>{n.imputado && <span>{n.imputado} · </span>}<span>{fd(n.fecha)}</span></div>
              {n.descripcion && <div style={{ fontSize: 13, color: "var(--text)", lineHeight: 1.6 }}>{n.descripcion}</div>}
            </div>
            <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
              <Btn small variant="ghost" onClick={() => { setForm({ ...n }); setModalOpen(true); }}>✏</Btn>
              <Btn small variant="danger" onClick={() => del(n.id)}>✕</Btn>
            </div>
          </div>
        ))}
        {!list.length && <div style={{ textAlign: "center", padding: 48, color: "var(--muted)" }}>No hay novedades registradas</div>}
      </div>
      <Modal open={modalOpen} onClose={() => setModalOpen(false)} title={form.id ? "Editar novedad" : "Nueva novedad"}>
        <Input label="Título *" value={form.titulo} onChange={v => f("titulo", v)} required />
        <Row2>
          <Select label="Tipo" value={form.tipo} onChange={v => f("tipo", v)} options={[{ value: "novedad", label: "Novedad" }, { value: "audiencia", label: "Audiencia" }, { value: "resolucion", label: "Resolución" }, { value: "urgente", label: "Urgente" }]} />
          <Input label="Fecha" value={form.fecha} onChange={v => f("fecha", v)} type="date" />
        </Row2>
        <Row2>
          <Select label="Imputado" value={form.imputado} onChange={v => { f("imputado", v); const p = (data.presos || []).find(p => p.nombre === v); if (p) f("sac", p.sac); }} options={presoOpts} />
          <Input label="SAC" value={form.sac} onChange={v => f("sac", v)} />
        </Row2>
        <Textarea label="Descripción" value={form.descripcion} onChange={v => f("descripcion", v)} rows={4} />
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <Btn variant="ghost" onClick={() => setModalOpen(false)}>Cancelar</Btn>
          <Btn onClick={save} disabled={saving}>{saving ? "Guardando..." : "Guardar"}</Btn>
        </div>
      </Modal>
    </div>
  );
}
